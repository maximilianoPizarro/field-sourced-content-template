apiVersion: v1
kind: ConfigMap
metadata:
  name: neuroface-ovms-config
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.json: |
    {
      "model_config_list": [
        {
          "config": {
            "name": "face-detection-retail-0005",
            "base_path": "/models/face-detection-retail-0005"
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroface-ovms
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: neuroface-ovms
    app.kubernetes.io/part-of: neuroface
    app.openshift.io/runtime: openvino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuroface-ovms
  template:
    metadata:
      labels:
        app: neuroface-ovms
    spec:
      initContainers:
        - name: download-model
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - sh
            - -c
            - |
              MODEL_DIR=/models/face-detection-retail-0005/1
              mkdir -p "$MODEL_DIR"
              BASE_URL="https://storage.openvinotoolkit.org/repositories/open_model_zoo/2023.0/models_bin/1/face-detection-retail-0005/FP16"
              echo "Downloading face-detection-retail-0005 FP16..."
              curl -sL "$BASE_URL/face-detection-retail-0005.xml" -o "$MODEL_DIR/face-detection-retail-0005.xml"
              curl -sL "$BASE_URL/face-detection-retail-0005.bin" -o "$MODEL_DIR/face-detection-retail-0005.bin"
              ls -lh "$MODEL_DIR/"
              echo "Model download complete"
          volumeMounts:
            - name: model-store
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: ovms
          image: openvino/model_server:2025.2.1
          args:
            - "--config_path=/config/config.json"
            - "--rest_port=8000"
            - "--port=9000"
          ports:
            - containerPort: 8000
              protocol: TCP
              name: rest
            - containerPort: 9000
              protocol: TCP
              name: grpc
          volumeMounts:
            - name: model-store
              mountPath: /models
              readOnly: true
            - name: ovms-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /v1/config
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: model-store
          emptyDir: {}
        - name: ovms-config
          configMap:
            name: neuroface-ovms-config
---
apiVersion: v1
kind: Service
metadata:
  name: neuroface-ovms
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: neuroface-ovms
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: rest
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: grpc
  selector:
    app: neuroface-ovms
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: neuroface-ovms
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: neuroface-ovms
spec:
  to:
    kind: Service
    name: neuroface-ovms
    weight: 100
  port:
    targetPort: rest
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cv.face.detections
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: dlq.cv-errors
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: camel-cv-route
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  cv-ovms-poller.camel.yaml: |
    - route:
        id: cv-ovms-status
        description: "Polls OVMS /v1/config every 30s to track model server status and loaded models"
        from:
          uri: timer:ovms-poll
          parameters:
            period: "30000"
            delay: "10000"
        steps:
          - setHeader:
              name: CamelHttpMethod
              constant: GET
          - doTry:
              steps:
                - to:
                    uri: http://neuroface-ovms.neuroface.svc:8000/v1/config
                - unmarshal:
                    json:
                      library: jackson
                - setBody:
                    simple: >
                      {
                        "event_type": "ovms_model_status",
                        "source": "openvino-model-server",
                        "model_name": "face-detection-retail-0005",
                        "model_server": "ovms",
                        "ovms_response": ${body},
                        "camera_id": "ovms-monitor",
                        "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}",
                        "person_name": "system",
                        "confidence": 1.0
                      }
                - marshal:
                    json:
                      library: jackson
                - to:
                    uri: kafka:cv.face.detections
                    parameters:
                      brokers: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9093
                      securityProtocol: SASL_SSL
                      saslMechanism: SCRAM-SHA-512
                      saslJaasConfig: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${env:KAFKA_USER}\" password=\"${env:KAFKA_PASSWORD}\";"
                      sslTruststoreLocation: /etc/kafka-certs/ca.crt
                      sslTruststoreType: PEM
                - log:
                    message: "OVMS model status published to Kafka"
              doCatch:
                - exceptions:
                    - java.lang.Exception
                  steps:
                    - log:
                        message: "OVMS not reachable: ${exception.message}"
  cv-labels-poller.camel.yaml: |
    - route:
        id: cv-labels-poller
        description: "Polls NeuroFace /api/labels every 30s to detect trained persons, publishes each to Kafka"
        from:
          uri: timer:labels-poll
          parameters:
            period: "30000"
            delay: "15000"
        steps:
          - setHeader:
              name: CamelHttpMethod
              constant: GET
          - doTry:
              steps:
                - to:
                    uri: http://neuroface-backend.neuroface.svc:8080/api/labels
                - unmarshal:
                    json:
                      library: jackson
                - split:
                    jsonpath: "$.labels"
                    steps:
                      - setBody:
                          simple: >
                            {
                              "event_type": "person_registered",
                              "source": "neuroface-lbph",
                              "person_name": "${body[name]}",
                              "face_count": ${body[face_count]},
                              "confidence": 1.0,
                              "camera_id": "label-registry",
                              "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}",
                              "detection_method": "lbph"
                            }
                      - marshal:
                          json:
                            library: jackson
                      - to:
                          uri: kafka:cv.face.detections
                          parameters:
                            brokers: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9093
                            securityProtocol: SASL_SSL
                            saslMechanism: SCRAM-SHA-512
                            saslJaasConfig: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${env:KAFKA_USER}\" password=\"${env:KAFKA_PASSWORD}\";"
                            sslTruststoreLocation: /etc/kafka-certs/ca.crt
                            sslTruststoreType: PEM
                      - log:
                          message: "Person registered event: ${body}"
              doCatch:
                - exceptions:
                    - java.lang.Exception
                  steps:
                    - log:
                        message: "NeuroFace backend not ready: ${exception.message}"
  cv-face-to-mail.camel.yaml: |
    - route:
        id: cv-face-notification
        description: "Consumer — reads face detections from Kafka and sends email notification via Mailpit"
        from:
          uri: kafka:cv.face.detections
          parameters:
            brokers: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9093
            groupId: camel-cv-consumer
            autoOffsetReset: latest
            valueDeserializer: org.apache.kafka.common.serialization.StringDeserializer
            securityProtocol: SASL_SSL
            saslMechanism: SCRAM-SHA-512
            saslJaasConfig: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${env:KAFKA_USER}\" password=\"${env:KAFKA_PASSWORD}\";"
            sslTruststoreLocation: /etc/kafka-certs/ca.crt
            sslTruststoreType: PEM
        onException:
          - exceptions:
              - java.lang.Exception
            handled:
              constant: true
            steps:
              - to:
                  uri: kafka:dlq.cv-errors
                  parameters:
                    brokers: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092
              - log:
                  message: "CV error sent to DLQ: ${exception.message}"
        steps:
          - log:
              message: "CV event received: ${body}"
          - unmarshal:
              json:
                library: jackson
          - choice:
              when:
                - simple: "${body[event_type]} == 'person_registered'"
                  steps:
                    - setBody:
                        simple: >
                          {
                            "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                            "to": [{"name": "Security Admin", "email": "admin@neuralbank.io"}],
                            "subject": "Person Registered: ${body[person_name]}",
                            "html": "<h2>New Person Registered</h2><p><b>Name:</b> ${body[person_name]}</p><p><b>Face samples:</b> ${body[face_count]}</p><p><b>Model:</b> ${body[detection_method]}</p><p><b>Timestamp:</b> ${body[timestamp]}</p><hr><p style='color:#666;font-size:12px'>NeuroFace LBPH &mdash; Event-Driven Architecture</p>"
                          }
                    - marshal:
                        json:
                          library: jackson
                    - to:
                        uri: http://n8n-mailpit.openshift-lightspeed.svc:8025/api/v1/send
                        parameters:
                          httpMethod: POST
                    - log:
                        message: "Person registration email sent for: ${body}"
                - simple: "${body[event_type]} == 'ovms_model_status'"
                  steps:
                    - setBody:
                        simple: >
                          {
                            "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                            "to": [{"name": "ML Ops", "email": "mlops@neuralbank.io"}],
                            "subject": "OVMS Model Status: ${body[model_name]}",
                            "html": "<h2>OpenVINO Model Server Status</h2><p><b>Model:</b> ${body[model_name]}</p><p><b>Server:</b> ${body[model_server]}</p><p><b>Timestamp:</b> ${body[timestamp]}</p><hr><p style='color:#666;font-size:12px'>OVMS Monitor &mdash; Event-Driven Architecture</p>"
                          }
                    - marshal:
                        json:
                          library: jackson
                    - to:
                        uri: http://n8n-mailpit.openshift-lightspeed.svc:8025/api/v1/send
                        parameters:
                          httpMethod: POST
                    - log:
                        message: "OVMS status email sent"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-cv-processor
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: camel-cv-processor
    app.kubernetes.io/part-of: neuroface-cv
    app.openshift.io/runtime: camel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camel-cv-processor
  template:
    metadata:
      labels:
        app: camel-cv-processor
    spec:
      containers:
        - name: camel
          image: docker.io/apache/camel-jbang:4.18.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp -a /.jbang /tmp/.jbang 2>/dev/null || true
              jbang trust add '*'
              camel run /config/cv-ovms-poller.camel.yaml /config/cv-labels-poller.camel.yaml /config/cv-face-to-mail.camel.yaml --max-seconds=0
          env:
            - name: JBANG_DIR
              value: /tmp/.jbang
            - name: KAFKA_USER
              value: cdc-user
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cdc-user
                  key: password
          volumeMounts:
            - name: route-config
              mountPath: /config
            - name: kafka-ca-cert
              mountPath: /etc/kafka-certs
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: route-config
          configMap:
            name: camel-cv-route
        - name: kafka-ca-cert
          secret:
            secretName: cdc-cluster-cluster-ca-cert
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neuroface-workbench
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    opendatahub.io/dashboard: "true"
spec:
  storageClassName: ocs-external-storagecluster-ceph-rbd-immediate
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: neuroface-workbench
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    notebooks.opendatahub.io/inject-oauth: "true"
    opendatahub.io/image-display-name: "Standard Data Science"
    openshift.io/display-name: "NeuroFace CV Pipeline"
    openshift.io/description: "Workbench for testing OpenVINO face detection, NeuroFace labels API, and Kafka CV events"
    notebooks.opendatahub.io/oauth-logout-url: "https://rhods-dashboard-redhat-ods-applications.{{ .Values.clusterDomain }}/projects/neuroface?notebookLogout=neuroface-workbench"
  labels:
    app: neuroface-workbench
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
spec:
  template:
    spec:
      affinity: {}
      containers:
        - name: neuroface-workbench
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-cpu-py312-ubi9:2025.1
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/neuroface/neuroface-workbench
                --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-cpu-py312-ubi9:2025.1
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - mountPath: /opt/app-root/src
              name: neuroface-workbench
          workingDir: /opt/app-root/src
          livenessProbe:
            httpGet:
              path: /notebook/neuroface/neuroface-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 40
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /notebook/neuroface/neuroface-workbench/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 40
            timeoutSeconds: 1
      volumes:
        - name: neuroface-workbench
          persistentVolumeClaim:
            claimName: neuroface-workbench
