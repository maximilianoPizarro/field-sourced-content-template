site:
  title: "Event-Driven Architecture & Industrial Edge"
  url: https://maximilianopizarro.github.io/field-sourced-content-template
  start_page: ROOT:en:index.adoc

content:
  sources:
    - url: https://github.com/maximilianoPizarro/field-sourced-content-template.git
      start_path: docs
      branches: one

asciidoc:
  extensions:
    - asciidoctor-kroki
  attributes:
    cluster_domain: "<CLUSTER_DOMAIN>"

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files:
    - path: ui.yml
      contents: |
        static_files:
          - .nojekyll
    - path: .nojekyll
      contents: ""
    - path: partials/head-icons.hbs
      contents: |
        <link rel="icon" type="image/png" href="data:image/png;base64,">
    - path: partials/header.hbs
      contents: |
        <header class="navbar" style="background:#151515;border-bottom:3px solid #c00;padding:0 16px">
          <div class="navbar-brand" style="display:flex;align-items:center;width:100%;gap:8px">
            <button class="navbar-burger" data-target="topbar-nav" style="color:#fff;display:none">
              <span style="background:#fff"></span>
              <span style="background:#fff"></span>
              <span style="background:#fff"></span>
            </button>
            <a class="navbar-item" href="{{or siteRootPath (or site.url '/')}}" style="display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:.9rem;text-decoration:none;padding:8px 0">
              <img src="data:image/png;base64," alt="Logo" style="height:26px;width:auto;border-radius:4px">
              Event-Driven Architecture &amp; Industrial Edge
            </a>
            <span id="user-info" style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0"></span>
            <span id="lang-switcher" style="display:flex;gap:4px;flex-shrink:0;margin-left:8px">
              <a id="lang-en" href="#" style="color:#fff;background:#c00;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;text-decoration:none;transition:opacity .2s">EN</a>
              <a id="lang-es" href="#" style="color:#ccc;background:#333;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;text-decoration:none;transition:opacity .2s">ES</a>
            </span>
          </div>
        </header>
        <script>
        document.addEventListener('DOMContentLoaded', function(){
          var p = new URLSearchParams(window.location.search);
          var u = p.get('USER_NAME');
          var c = p.get('CLUSTER_DOMAIN');
          if (!u) { try { var pp = new URLSearchParams(window.parent.location.search); u = pp.get('USER_NAME'); c = pp.get('CLUSTER_DOMAIN'); } catch(e){} }
          var el = document.getElementById('user-info');
          if (el && (u || c)) {
            var html = '';
            if (u) html += '<span style="background:#c00;color:#fff;padding:2px 8px;border-radius:3px;font-weight:600;font-size:11px">'+u+'</span>';
            if (u) html += '<span style="color:#aaa;font-size:9px">Pass: Welcome123! &middot; IDP: workshop-users</span>';
            if (c) html += '<span style="color:#666;font-size:9px">'+c+'</span>';
            el.innerHTML = html;
          }
          var burger = document.querySelector('.navbar-burger');
          if (burger) {
            burger.addEventListener('click', function() {
              var nav = document.querySelector('.nav-container');
              burger.classList.toggle('is-active');
              if (nav) nav.classList.toggle('is-active');
            });
          }
          var path = window.location.pathname;
          var enBtn = document.getElementById('lang-en');
          var esBtn = document.getElementById('lang-es');
          var isEs = path.indexOf('/es/') !== -1;
          if (isEs) {
            esBtn.style.background = '#c00'; esBtn.style.color = '#fff';
            enBtn.style.background = '#333'; enBtn.style.color = '#ccc';
          }
          if (enBtn) enBtn.onclick = function(e) {
            e.preventDefault();
            if (path.indexOf('/es/') !== -1) window.location.href = path.replace('/es/', '/en/');
            else if (path.indexOf('/en/') === -1) window.location.href = path.replace(/\/[^\/]*$/, '/en/index.html');
          };
          if (esBtn) esBtn.onclick = function(e) {
            e.preventDefault();
            if (path.indexOf('/en/') !== -1) window.location.href = path.replace('/en/', '/es/');
            else if (path.indexOf('/es/') === -1) window.location.href = path.replace(/\/[^\/]*$/, '/es/index.html');
          };
        });
        </script>
    - path: partials/toolbar.hbs
      contents: |
        <div class="toolbar" role="navigation">
          <button class="nav-toggle"></button>
        </div>
    - path: partials/footer-content.hbs
      contents: |
        <footer class="footer" style="background:#151515;border-top:3px solid #c00;padding:24px 32px">
          <div style="max-width:1200px;margin:0 auto">
            <div style="display:flex;flex-wrap:wrap;gap:32px;margin-bottom:20px">
              <div style="flex:1;min-width:200px">
                <div style="color:#fff;font-weight:700;font-size:13px;margin-bottom:10px;font-family:RedHatDisplay,sans-serif">Data Streaming</div>
                <div style="color:#aaa;font-size:11px;line-height:1.6"><b style="color:#e0e0e0">Streams for Apache Kafka</b> — Cluster Kafka en modo KRaft para streaming distribuido<br><b style="color:#e0e0e0">Debezium</b> — Change Data Capture desde PostgreSQL en tiempo real<br><b style="color:#e0e0e0">Apicurio Registry</b> — Schema Registry para gobierno de esquemas Avro/JSON/Protobuf</div>
              </div>
              <div style="flex:1;min-width:200px">
                <div style="color:#fff;font-weight:700;font-size:13px;margin-bottom:10px;font-family:RedHatDisplay,sans-serif">Integration &amp; BPM</div>
                <div style="color:#aaa;font-size:11px;line-height:1.6"><b style="color:#e0e0e0">Apache Camel</b> — Framework de integracion con Enterprise Integration Patterns<br><b style="color:#e0e0e0">Kaoto</b> — Disenador visual low-code de rutas Camel en DevSpaces<br><b style="color:#e0e0e0">SonataFlow</b> — Motor de workflows serverless para procesos de negocio (BPM)</div>
              </div>
              <div style="flex:1;min-width:200px">
                <div style="color:#fff;font-weight:700;font-size:13px;margin-bottom:10px;font-family:RedHatDisplay,sans-serif">Industrial Edge &amp; Platform</div>
                <div style="color:#aaa;font-size:11px;line-height:1.6"><b style="color:#e0e0e0">IoT Sensors + AMQ Broker</b> — MQTT data ingestion from 20K devices<br><b style="color:#e0e0e0">OpenShift AI</b> — ModelMesh, JupyterLab, DS Pipelines<br><b style="color:#e0e0e0">KafkaMirrorMaker2</b> — Cross-cluster replication for external queries<br><b style="color:#e0e0e0">Developer Hub</b> — Self-service portal with Kafka plugin &amp; TechDocs</div>
              </div>
            </div>
            <div style="border-top:1px solid #333;padding-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
              <span style="color:#999;font-size:10px">Event-Driven Architecture &amp; Industrial Edge &middot; Red Hat Demo Platform &middot; <a href="https://demo.redhat.com" target="_blank" style="color:#73bcf7;text-decoration:none">demo.redhat.com</a></span>
              <span style="color:#999;font-size:10px">by <a href="https://maximilianopizarro.github.io" target="_blank" style="color:#73bcf7;text-decoration:none;font-weight:500">maximilianoPizarro</a></span>
            </div>
          </div>
        </footer>
    - path: partials/footer-scripts.hbs
      contents: |
        <script id="site-script" src="{{uiRootPath}}/js/site.js" data-ui-root-path="{{uiRootPath}}"></script>
        <script async src="{{uiRootPath}}/js/vendor/highlight.js"></script>
        <script src="{{uiRootPath}}/js/three-helper.js"></script>
    - path: css/extra.css
      contents: |
        :root {
          --color-brand-red: #CC0000;
          --color-brand-dark: #151515;
          --color-brand-blue: #0066CC;
          --color-bg-page: #f0f2f5;
          --color-bg-content: #ffffff;
        }
        html { background: var(--color-bg-page); }
        .body {
          display: flex;
          max-width: none !important;
          margin: 0 !important;
        }
        main.article { max-width: none !important; }
        .body .nav-container {
          width: 230px;
          min-width: 230px;
          flex-shrink: 0;
          background: var(--color-brand-dark);
          border-right: 1px solid #333;
        }
        .nav-panel-menu { background: var(--color-brand-dark); }
        .nav-panel-menu .nav-list { padding: 4px 0; }
        .nav-panel-menu .nav-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-panel-menu .nav-link {
          color: #ccc !important;
          font-size: 0.82rem;
          padding: 6px 16px;
          transition: background 0.15s, color 0.15s;
        }
        .nav-panel-menu .nav-link:hover {
          background: rgba(255,255,255,0.08);
          color: #fff !important;
        }
        .nav-panel-menu .nav-link.is-current-page {
          border-left: 3px solid var(--color-brand-red);
          font-weight: 700;
          color: #fff !important;
          background: rgba(204,0,0,0.08);
        }
        .nav-panel-explore { display: none !important; }
        .body .content {
          flex: 1;
          max-width: none !important;
          background: var(--color-bg-content);
          min-height: 100vh;
        }
        .doc {
          max-width: none !important;
          margin: 0 !important;
          padding: 2rem 3rem !important;
        }
        .article { max-width: none !important; }
        .toolbar { max-width: none !important; display: none; }
        .toc-sidebar {
          width: 220px;
          min-width: 220px;
          flex-shrink: 0;
          background: #f8f9fa;
          border-left: 1px solid #e0e0e0;
          padding-top: 1rem;
        }
        .toc-sidebar .toc-menu a { font-size: 0.8rem; color: #555; }
        .toc-sidebar .toc-menu a:hover { color: var(--color-brand-blue); }
        .navbar {
          background: var(--color-brand-dark) !important;
          border-bottom: 3px solid var(--color-brand-red);
          max-width: none !important;
          padding: 0 16px;
        }
        .navbar-brand { max-width: none !important; }
        .navbar .navbar-brand { color: #fff !important; font-weight: 700; }
        .navbar .navbar-item { color: #fff !important; }
        .navbar .navbar-burger { color: #fff !important; }
        .navbar .navbar-burger span { background-color: #fff !important; }
        .navbar-menu { background: var(--color-brand-dark) !important; }
        .navbar-menu .navbar-item { color: #ddd !important; }
        .doc h1 {
          color: var(--color-brand-dark);
          border-bottom: 3px solid var(--color-brand-red);
          padding-bottom: 0.5rem;
          margin-bottom: 1.5rem;
        }
        .doc h2 {
          color: #1a1a1a;
          border-left: 4px solid var(--color-brand-red);
          padding-left: 12px;
          margin-top: 2rem;
        }
        .doc h3 { color: #333; }
        .doc a { color: var(--color-brand-blue); }
        .doc th { background: var(--color-brand-dark); color: #fff; }
        .doc td { border-bottom: 1px solid #e8e8e8; }
        .doc table { width: 100%; border-collapse: collapse; }
        .admonitionblock {
          border-radius: 6px;
          margin: 1rem 0;
        }
        .admonitionblock .icon { background: var(--color-brand-blue); }
        pre.highlight {
          background: #1e1e2e !important;
          border-radius: 8px;
          border: 1px solid #333;
        }
        pre.highlight code { font-size: 0.85rem; color: #e0e0e0; }
        .three-container {
          width: 100%;
          height: 500px;
          border: 1px solid #333;
          border-radius: 12px;
          margin: 1.5rem 0;
          background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
          position: relative;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        [id^="scene-"] {
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3);
          border: 1px solid #333;
        }
        .fullscreen-btn {
          position: absolute;
          top: 10px;
          right: 10px;
          z-index: 100;
          background: rgba(0,0,0,0.75);
          color: #fff;
          border: 1px solid rgba(255,255,255,0.25);
          border-radius: 6px;
          padding: 6px 14px;
          cursor: pointer;
          font-size: 14px;
          transition: background 0.2s, border-color 0.2s, transform 0.15s;
          backdrop-filter: blur(4px);
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .fullscreen-btn:hover {
          background: rgba(0,102,204,0.8);
          border-color: rgba(255,255,255,0.5);
          transform: scale(1.05);
        }
        .doc .imageblock img { cursor: pointer; transition: transform 0.2s; border-radius: 6px; }
        .doc .imageblock img:hover { transform: scale(1.02); }
        .img-overlay {
          position: fixed;
          top: 0; left: 0; width: 100vw; height: 100vh;
          background: rgba(0,0,0,0.92);
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: zoom-out;
        }
        .img-overlay img {
          max-width: 95vw;
          max-height: 95vh;
          border-radius: 8px;
          box-shadow: 0 0 40px rgba(0,102,204,0.3);
        }
        [id^="scene-"]:fullscreen,
        .three-container:fullscreen {
          background: #0a0a1a;
          width: 100vw !important;
          height: 100vh !important;
          border: none !important;
          border-radius: 0 !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        :fullscreen .fullscreen-btn {
          top: 16px;
          right: 16px;
          padding: 8px 18px;
          font-size: 15px;
        }
        :fullscreen canvas {
          width: 100vw !important;
          height: 100vh !important;
        }
        @media (max-width: 768px) {
          .body .nav-container {
            position: fixed;
            top: 0; left: -260px;
            width: 260px;
            height: 100vh;
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            background: var(--color-brand-dark);
          }
          .body .nav-container.is-active {
            left: 0;
          }
          .toc-sidebar { display: none; }
          .navbar { padding: 0 8px; }
          .navbar .navbar-burger {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
          }
          .doc { padding: 1rem !important; }
          .doc table { display: block; overflow-x: auto; }
          .doc table th, .doc table td { font-size: 0.8rem; padding: 6px 8px; }
          .doc pre { font-size: 0.75rem; overflow-x: auto; }
          .navbar-item { font-size: 0.85rem; }
          .three-container, [id^="scene-"] { height: 280px !important; min-height: 280px !important; }
          .doc h1 { font-size: 1.4rem; }
          .doc h2 { font-size: 1.15rem; }
          #user-info { display: none !important; }
        }
        @media (max-width: 480px) {
          .three-container, [id^="scene-"] { height: 200px !important; min-height: 200px !important; }
          .doc { padding: 0.5rem !important; }
          .doc h1 { font-size: 1.2rem; }
        }
    - path: js/three-helper.js
      contents: |
        window.ThreeHelper = {
          initScene: function(containerId, options) {
            var opts = options || {};
            var container = document.getElementById(containerId);
            if (!container) return null;
            var w = container.clientWidth || 800;
            var h = opts.height || 400;
            container.style.height = h + 'px';
            container.style.position = 'relative';
            container.style.borderRadius = '12px';
            container.style.overflow = 'hidden';
            container.style.marginBottom = '1.5rem';

            var scene = new THREE.Scene();
            scene.background = new THREE.Color(opts.bgColor || 0x0a0a1a);
            scene.fog = new THREE.FogExp2(opts.bgColor || 0x0a0a1a, 0.015);

            var camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera.position.set(opts.camX || 0, opts.camY || 8, opts.camZ || 20);

            var renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            var controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = opts.autoRotate !== false;
            controls.autoRotateSpeed = opts.rotateSpeed || 0.5;

            scene.add(new THREE.AmbientLight(0x404060, 0.6));
            var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            var pointLight = new THREE.PointLight(0x4488ff, 0.5, 50);
            pointLight.position.set(-5, 10, 5);
            scene.add(pointLight);

            var gridHelper = new THREE.GridHelper(40, 40, 0x1a1a3a, 0x1a1a3a);
            gridHelper.position.y = -2;
            scene.add(gridHelper);

            var fsBtn = document.createElement('button');
            fsBtn.className = 'fullscreen-btn';
            fsBtn.innerHTML = '\u26F6 Fullscreen';
            var isFullscreen = false;

            function resizeRenderer() {
              var fs = document.fullscreenElement === container || document.webkitFullscreenElement === container;
              var nw = fs ? window.innerWidth : container.clientWidth;
              var nh = fs ? window.innerHeight : h;
              camera.aspect = nw / nh;
              camera.updateProjectionMatrix();
              renderer.setSize(nw, nh);
            }

            fsBtn.onclick = function() {
              if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
              } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
              }
            };
            container.appendChild(fsBtn);

            function onFullscreenChange() {
              var fs = document.fullscreenElement === container || document.webkitFullscreenElement === container;
              isFullscreen = fs;
              fsBtn.innerHTML = fs ? '\u2715 Exit' : '\u26F6 Fullscreen';
              setTimeout(resizeRenderer, 50);
            }
            document.addEventListener('fullscreenchange', onFullscreenChange);
            document.addEventListener('webkitfullscreenchange', onFullscreenChange);
            window.addEventListener('resize', resizeRenderer);

            return { scene: scene, camera: camera, renderer: renderer, controls: controls };
          },

          createNode: function(scene, label, color, x, y, z, options) {
            var opts = options || {};
            var sx = opts.width || 2.5; var sy = opts.height || 1.2; var sz = opts.depth || 1.2;
            var geo = new THREE.BoxGeometry(sx, sy, sz);
            var mat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.85, shininess: 80 });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            var edges = new THREE.EdgesGeometry(geo);
            var lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            var wireframe = new THREE.LineSegments(edges, lineMat);
            wireframe.position.copy(mesh.position);
            scene.add(wireframe);

            if (label) {
              var canvas = document.createElement('canvas');
              canvas.width = 256; canvas.height = 64;
              var ctx = canvas.getContext('2d');
              ctx.fillStyle = 'transparent'; ctx.fillRect(0, 0, 256, 64);
              ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
              ctx.fillText(label, 128, 40);
              var texture = new THREE.CanvasTexture(canvas);
              var spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
              var sprite = new THREE.Sprite(spriteMat);
              sprite.position.set(x, y + sy / 2 + 0.8, z);
              sprite.scale.set(3, 0.75, 1);
              scene.add(sprite);
            }
            return mesh;
          },

          createEdge: function(scene, from, to, color, options) {
            var opts = options || {};
            var points = [];
            var start = from.position.clone();
            var end = to.position.clone();
            points.push(start); points.push(end);
            var geo = new THREE.BufferGeometry().setFromPoints(points);
            var mat = new THREE.LineBasicMaterial({ color: color || 0x4488ff, transparent: true, opacity: 0.4 });
            var line = new THREE.Line(geo, mat);
            scene.add(line);

            var particleCount = opts.particleCount || 8;
            var pGeo = new THREE.BufferGeometry();
            var positions = new Float32Array(particleCount * 3);
            for (var i = 0; i < particleCount; i++) {
              var t = i / particleCount;
              positions[i * 3] = start.x + (end.x - start.x) * t;
              positions[i * 3 + 1] = start.y + (end.y - start.y) * t;
              positions[i * 3 + 2] = start.z + (end.z - start.z) * t;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            var pMat = new THREE.PointsMaterial({ color: color || 0x44aaff, size: opts.particleSize || 0.15, transparent: true, opacity: 0.8 });
            var particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            return { line: line, particles: particles, start: start, end: end, speed: opts.speed || 0.005 };
          },

          animateEdges: function(edges, time) {
            edges.forEach(function(edge) {
              var positions = edge.particles.geometry.attributes.position.array;
              var count = positions.length / 3;
              for (var i = 0; i < count; i++) {
                var t = ((i / count) + time * edge.speed) % 1;
                positions[i * 3] = edge.start.x + (edge.end.x - edge.start.x) * t;
                positions[i * 3 + 1] = edge.start.y + (edge.end.y - edge.start.y) * t;
                positions[i * 3 + 2] = edge.start.z + (edge.end.z - edge.start.z) * t;
              }
              edge.particles.geometry.attributes.position.needsUpdate = true;
            });
          },

          animate: function(ctx, edges, customFn) {
            var clock = new THREE.Clock();
            function loop() {
              requestAnimationFrame(loop);
              var elapsed = clock.getElapsedTime();
              ctx.controls.update();
              if (edges) ThreeHelper.animateEdges(edges, elapsed);
              if (customFn) customFn(elapsed);
              ctx.renderer.render(ctx.scene, ctx.camera);
            }
            loop();
          }
        };

        document.addEventListener('DOMContentLoaded', function() {
          document.querySelectorAll('.doc .imageblock img').forEach(function(img) {
            img.addEventListener('click', function() {
              var overlay = document.createElement('div');
              overlay.className = 'img-overlay';
              var clone = img.cloneNode();
              overlay.appendChild(clone);
              overlay.addEventListener('click', function() { overlay.remove(); });
              document.body.appendChild(overlay);
            });
          });

          var burger = document.querySelector('.navbar-burger');
          if (burger) {
            burger.addEventListener('click', function() {
              var target = document.getElementById(burger.dataset.target);
              burger.classList.toggle('is-active');
              if (target) target.classList.toggle('is-active');
              var nav = document.querySelector('.nav-container');
              if (nav) nav.classList.toggle('is-active');
            });
          }

          document.querySelectorAll('.three-container, [id^="scene-"]').forEach(function(el) {
            if (el.querySelector('.fullscreen-btn')) return;
            el.style.position = el.style.position || 'relative';
            var btn = document.createElement('button');
            btn.className = 'fullscreen-btn';
            btn.innerHTML = '\u26F6 Fullscreen';
            btn.onclick = function() {
              if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
              } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
              }
            };
            el.appendChild(btn);
            function onFsChange() {
              var fs = document.fullscreenElement === el || document.webkitFullscreenElement === el;
              btn.innerHTML = fs ? '\u2715 Exit' : '\u26F6 Fullscreen';
              var canvas = el.querySelector('canvas');
              if (canvas) {
                var nw = fs ? window.innerWidth : el.clientWidth;
                var nh = fs ? window.innerHeight : (parseInt(el.style.height) || 400);
                canvas.style.width = nw + 'px';
                canvas.style.height = nh + 'px';
              }
            }
            document.addEventListener('fullscreenchange', onFsChange);
            document.addEventListener('webkitfullscreenchange', onFsChange);
          });
        });

