            {"expr": "sum(kafka_topic_partition_under_replicated_partition{namespace=\"industrial-edge-stormshift-messaging\"}) by (topic)", "legendFormat": "factory: {{`{{topic}}`}}"},
            {"expr": "sum(kafka_topic_partition_under_replicated_partition{namespace=\"industrial-edge-data-lake\"}) by (topic)", "legendFormat": "prod: {{`{{topic}}`}}"}
