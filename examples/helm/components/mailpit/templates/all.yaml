apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-mailpit
  namespace: openshift-lightspeed
  labels:
    app: n8n-mailpit
    app.kubernetes.io/part-of: mailpit
    app.openshift.io/runtime: email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-mailpit
  template:
    metadata:
      labels:
        app: n8n-mailpit
    spec:
      containers:
        - name: mailpit
          image: docker.io/axllent/mailpit:v1.21
          ports:
            - containerPort: 8025
              name: http
              protocol: TCP
            - containerPort: 1025
              name: smtp
              protocol: TCP
          env:
            - name: MP_UI_BIND_ADDR
              value: "0.0.0.0:8025"
            - name: MP_SMTP_BIND_ADDR
              value: "0.0.0.0:1025"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-mailpit
  namespace: openshift-lightspeed
  labels:
    app: n8n-mailpit
spec:
  ports:
    - port: 8025
      targetPort: 8025
      protocol: TCP
      name: http
    - port: 1025
      targetPort: 1025
      protocol: TCP
      name: smtp
  selector:
    app: n8n-mailpit
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: n8n-mailpit
  namespace: openshift-lightspeed
  labels:
    app: n8n-mailpit
spec:
  to:
    kind: Service
    name: n8n-mailpit
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
