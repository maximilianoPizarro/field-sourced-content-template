apiVersion: che.eclipse.org/v1alpha1
kind: KubernetesImagePuller
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: image-puller-config
  namespace: devspaces
spec:
  daemonsetName: k8s-image-puller
  deploymentName: k8s-image-puller-operator
  images: udi-rhel9=registry.redhat.io/devspaces/udi-rhel9:latest;che-code=quay.io/che-incubator/che-code:latest
  maxProcessConcurrent: "10"
---
apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous=true
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app.kubernetes.io/instance: devspaces
  name: devspaces
  namespace: devspaces
spec:
  components:
    cheServer:
      debug: false
      deployment:
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 2Gi
    devfileRegistry:
      disableInternalRegistry: false
      externalDevfileRegistries:
      - url: https://registry.devfile.io
    pluginRegistry:
      openVSXURL: https://open-vsx.org
  devEnvironments:
    defaultComponents:
    - container:
        cpuLimit: 4000m
        cpuRequest: 2000m
        image: registry.redhat.io/devspaces/udi-rhel9:latest
        memoryLimit: 8Gi
        memoryRequest: 4Gi
      name: universal-developer-image
    defaultEditor: che-incubator/che-code/latest
    defaultNamespace:
      autoProvision: true
      template: <username>-devspaces
    disableContainerBuildCapabilities: false
    secondsOfInactivityBeforeIdling: 3600
    storage:
      pvcStrategy: per-user
  security:
    containerSecurityContext:
      allowPrivilegeEscalation: true
      capabilities:
        add:
        - SETGID
        - SETUID
