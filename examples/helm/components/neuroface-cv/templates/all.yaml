apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-secret-sync-{{ .Release.Revision | default "1" }}
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: kafka-secret-sync
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["bash", "-c"]
          args:
            - |
              MAX_WAIT=300
              INTERVAL=10
              ELAPSED=0
              echo "Waiting for Kafka secrets in kafka-cdc namespace..."
              while [ $ELAPSED -lt $MAX_WAIT ]; do
                if oc get secret cdc-cluster-cluster-ca-cert -n kafka-cdc >/dev/null 2>&1 && \
                   oc get secret cdc-user -n kafka-cdc >/dev/null 2>&1; then
                  echo "Kafka secrets found after ${ELAPSED}s"
                  break
                fi
                echo "Secrets not ready yet (${ELAPSED}/${MAX_WAIT}s)... waiting"
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
              done
              if [ $ELAPSED -ge $MAX_WAIT ]; then
                echo "ERROR: Timed out waiting for Kafka secrets"
                exit 1
              fi
              for SECRET_NAME in cdc-cluster-cluster-ca-cert cdc-user; do
                if oc get secret "$SECRET_NAME" -n neuroface >/dev/null 2>&1; then
                  echo "Secret $SECRET_NAME already exists in neuroface"
                  continue
                fi
                echo "Copying $SECRET_NAME from kafka-cdc to neuroface..."
                oc get secret "$SECRET_NAME" -n kafka-cdc -o json \
                  | python3 -c "import sys,json; s=json.load(sys.stdin); s['metadata']={'name':s['metadata']['name'],'namespace':'neuroface','labels':{'app.kubernetes.io/managed-by':'kafka-secret-sync'}}; json.dump(s,sys.stdout)" \
                  | oc apply -f - -n neuroface
              done
              echo "Secret sync complete"
