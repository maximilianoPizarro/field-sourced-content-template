# =============================================================================
# Lite Profile — Event-Driven Architecture workshop with minimal resources
# =============================================================================
#
# Usage:
#   helm install field-content . -f values.yaml -f values-lite.yaml
#
# Or override in ArgoCD Application valuesFiles:
#   source:
#     helm:
#       valueFiles:
#         - values.yaml
#         - values-lite.yaml
#
# Estimated footprint:
#   Infra fixed: ~20-25 vCPU, ~30-40 Gi RAM, ~150 GB disk
#   Per user:    ~1.5 vCPU, ~1.5 Gi RAM (no DevSpaces)
#   30 users:    2-3 workers m5.4xlarge (16 vCPU, 64 Gi)
#
# What stays:  Kafka CDC pipeline, Developer Hub, Keycloak, Gitea,
#              ApplicationSets, Neuralbank demo, Showroom, Registration
# What's off:  AI/ML, DevSpaces, Service Mesh, Observability stack,
#              MCP Gateway, Kuadrant, BPM workflows
# =============================================================================

userCount: 30

connectivityLink:
  operators:
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators

  apps:
    # --- Core infrastructure (always on) ---
    - id: connectivity-link-namespaces
      enabled: true
      path: connectivity-link-namespaces
      destinationNamespace: openshift-gitops
      syncWave: "1"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
