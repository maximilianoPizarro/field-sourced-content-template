apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: mlserver-sklearn
  namespace: ml-development
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  lookupPolicy:
    local: true
  tags:
    - name: "1.3.5"
      from:
        kind: DockerImage
        name: docker.io/seldonio/mlserver:1.3.5-sklearn
      importPolicy:
        importMode: Legacy
      referencePolicy:
        type: Local
