##
## 5. MCP Controller Deployment
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-controller
  namespace: mcp-system
  labels:
    app: mcp-controller
    app.kubernetes.io/part-of: mcp-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-controller
  template:
    metadata:
      labels:
        app: mcp-controller
        app.kubernetes.io/part-of: mcp-gateway
    spec:
      serviceAccountName: mcp-controller
      containers:
        - name: controller
          image: ghcr.io/kuadrant/mcp-controller:latest
          command:
            - ./mcp_controller
          args:
            - --log-level=0
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
