{%- if values.anomalyDetection %}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: anomaly-detection-model-server
  namespace: ${{values.namespace}}
  labels:
    name: modelmesh-serving-anomaly-detection-model-server
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    maxLoadingConcurrency: "2"
spec:
  supportedModelFormats:
    - name: sklearn
      version: "0"
      autoSelect: true
  builtInAdapter:
    serverType: mlserver
    runtimeManagementPort: 8001
    memBufferBytes: 134217728
    modelLoadingTimeoutMillis: 90000
  containers:
    - name: mlserver
      image: quay.io/opendatahub/mlserver:1.3.1
      env:
        - name: MLSERVER_MODELS_DIR
          value: /models/_mlserver_models/
        - name: MLSERVER_GRPC_PORT
          value: "8001"
        - name: MLSERVER_HTTP_PORT
          value: "8002"
        - name: MLSERVER_LOAD_MODELS_AT_STARTUP
          value: "false"
        - name: MLSERVER_MODEL_NAME_REGEXP
          value: ".*"
        - name: MLSERVER_GRPC_MAX_MESSAGE_LENGTH
          value: "-1"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
  grpcEndpoint: port:8085
  grpcDataEndpoint: port:8001
  multiModel: true
  replicas: 1
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: inference-service
  namespace: ${{values.namespace}}
  annotations:
    serving.kserve.io/deploymentMode: ModelMesh
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  predictor:
    model:
      modelFormat:
        name: sklearn
      runtime: anomaly-detection-model-server
      storage:
        key: localMinIO
        path: sklearn/model
{%- endif %}
