apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: industrial-edge
  title: "Industrial Edge: IoT Manufacturing Platform"
  description: >
    Deploys a complete Industrial Edge IoT stack: 2 machine sensors (MQTT),
    AMQ Broker, Kafka cluster (KRaft), MQTT→Kafka Camel K integration,
    IoT consumer with anomaly detection, and a real-time Line Dashboard.
    Each instance gets its own namespace, Kafka cluster, and ArgoCD Application.
  tags:
    - iot
    - kafka
    - edge
    - manufacturing
    - industrial-edge
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Edge Instance Configuration
      required:
        - name
        - owner
      properties:
        name:
          title: Instance Name
          type: string
          default: edge-factory-1
          pattern: "^[a-z0-9-]+$"
          description: "Unique name for this edge instance (e.g. edge-factory-1, edge-plant-nyc)"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "Industrial Edge IoT manufacturing line"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Namespace: <username>-<instance-name>"
          default: ${{ user.entity.metadata.name }}
          pattern: "^[a-z][a-z0-9-]*$"
          ui:help: "E.g.: user1 → namespace user1-edge-factory-1"
        sensorCount:
          title: Number of Machine Sensors
          type: integer
          default: 2
          enum: [1, 2, 4, 8]
          description: "How many sensor simulators to deploy"
        kafkaReplicas:
          title: Kafka Broker Replicas
          type: integer
          default: 3
          enum: [1, 3]
          description: "KRaft broker+controller nodes (1 for dev, 3 for HA)"
        anomalyDetection:
          title: Enable Anomaly Detection (ML)
          type: boolean
          default: false
          description: "Deploy ServingRuntime + InferenceService for vibration anomaly detection"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: ""
          description: "OpenShift apps domain (oc get ingresses.config cluster -o jsonpath='{.spec.domain}')"
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-${{ parameters.name }}"
          clusterDomain: ${{ parameters.clusterDomain }}
          sensorCount: ${{ parameters.sensorCount }}
          kafkaReplicas: ${{ parameters.kafkaReplicas }}
          anomalyDetection: ${{ parameters.anomalyDetection }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: create-argocd-app
      name: Create ArgoCD Application
      action: http:backstage:request
      input:
        method: POST
        path: "/proxy/k8s-api/apis/argoproj.io/v1alpha1/namespaces/openshift-gitops/applications"
        headers:
          Content-Type: application/json
        body:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "${{ parameters.owner }}-${{ parameters.name }}"
            namespace: openshift-gitops
            labels:
              backstage.io/kubernetes-id: "${{ parameters.owner }}-${{ parameters.name }}"
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: "http://gitea-http.gitea.svc.cluster.local:3000/ws-${{ parameters.owner }}/${{ parameters.name }}.git"
              targetRevision: main
              path: manifests
            destination:
              server: https://kubernetes.default.svc
              namespace: "${{ parameters.owner }}-${{ parameters.name }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml
    - id: notify
      name: Send Email Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "Industrial Edge — New IoT Instance Deployed"
          Text: "Industrial Edge Notification — Your IoT manufacturing instance ${{ parameters.owner }}-${{ parameters.name }} has been provisioned in namespace ${{ parameters.owner }}-${{ parameters.name }}. Components: ${{ parameters.sensorCount }} sensors, AMQ Broker, Kafka (${{ parameters.kafkaReplicas }}-node KRaft), Camel K, Line Dashboard."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#EE0000;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px;font-weight:600;letter-spacing:0.5px'>Industrial Edge</h1><p style='color:#ffcccc;margin:4px 0 0;font-size:12px'>IoT Manufacturing Platform</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>Edge Instance Deployed</h2><p style='color:#6a6e73;font-size:14px;line-height:1.6;margin:0 0 20px'>Your IoT manufacturing line has been provisioned.</p><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:140px'>Instance</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}-${{ parameters.name }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Namespace</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}-${{ parameters.name }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Sensors</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.sensorCount }} machines</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Kafka</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.kafkaReplicas }}-node KRaft cluster</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Status</td><td style='padding:10px 0;color:#151515;font-weight:500'><span style='background:#faeae8;color:#c9190b;padding:2px 8px;border-radius:12px;font-size:12px'>Deploying</span></td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Industrial Edge &bull; Powered by Red Hat Developer Hub</div></div>"
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in DevSpaces (Kaoto)
        icon: chat
        url: "https://devspaces.${{ parameters.clusterDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}"
      - title: Line Dashboard
        icon: dashboard
        url: "https://line-dashboard-${{ parameters.owner }}-${{ parameters.name }}.${{ parameters.clusterDomain }}"
      - title: Kafka Streams Console
        icon: dashboard
        url: "https://kafka-console-kafka-cdc.${{ parameters.clusterDomain }}"
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
