quarkus.application.name=${{ values.name }}
quarkus.mcp.server.server-info.name=${{ values.name }}
quarkus.mcp.server.server-info.version=1.0.0

# Kafka connection - uses the live AMQ Streams cluster
kafka.bootstrap.servers=cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092

# Apicurio Registry
apicurio.registry.url=http://apicurio-registry-service.kafka-cdc.svc:8080

# PostgreSQL CDC source database
postgresql.host=cdc-postgresql.kafka-cdc.svc
postgresql.port=5432
postgresql.database=cdcdb
postgresql.username=cdcuser
postgresql.password=cdcpassword

quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
