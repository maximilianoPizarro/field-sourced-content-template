---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: cv-face-detection-events
  namespace: default
  description: "Face detection events published to Kafka topic cv.face.detections"
  tags:
    - kafka
    - asyncapi
    - computer-vision
spec:
  type: asyncapi
  lifecycle: production
  owner: platform-engineering
  system: neuroface-system
  definition: |
    asyncapi: 2.6.0
    info:
      title: NeuroFace CV Events
      version: 2.0.0
      description: |
        Events from the NeuroFace Computer Vision pipeline.
        Two sources publish to this topic:
        (1) OVMS poller reads OpenVINO Model Server status,
        (2) Labels poller reads trained persons from LBPH recognizer.
    channels:
      cv.face.detections:
        publish:
          summary: CV pipeline events (person_registered or ovms_model_status)
          message:
            oneOf:
              - name: PersonRegistered
                summary: A person was detected in the LBPH label registry
                payload:
                  type: object
                  required:
                    - event_type
                    - person_name
                    - timestamp
                  properties:
                    event_type:
                      type: string
                      enum: [person_registered]
                    source:
                      type: string
                      enum: [neuroface-lbph]
                    person_name:
                      type: string
                      description: Name/label of the trained person
                    face_count:
                      type: integer
                      description: Number of face samples used for training
                    confidence:
                      type: number
                    camera_id:
                      type: string
                    timestamp:
                      type: string
                      format: date-time
                    detection_method:
                      type: string
                      enum: [lbph]
              - name: OvmsModelStatus
                summary: OpenVINO Model Server status from /v1/config
                payload:
                  type: object
                  required:
                    - event_type
                    - model_name
                    - timestamp
                  properties:
                    event_type:
                      type: string
                      enum: [ovms_model_status]
                    source:
                      type: string
                      enum: [openvino-model-server]
                    model_name:
                      type: string
                      description: Name of the served model (e.g. face-detection-retail-0005)
                    model_server:
                      type: string
                      enum: [ovms]
                    ovms_response:
                      type: object
                      description: Raw response from OVMS /v1/config endpoint
                    camera_id:
                      type: string
                    timestamp:
                      type: string
                      format: date-time
                    person_name:
                      type: string
                      description: Always "system" for health events
                    confidence:
                      type: number
      dlq.cv-errors:
        publish:
          summary: Dead letter queue for failed CV event processing
          message:
            payload:
              type: object
              description: Original message that failed processing, with error headers
    servers:
      cdc-cluster:
        url: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092
        protocol: kafka
