# =============================================================================
# Lite Profile — Event-Driven Architecture workshop with minimal resources
# =============================================================================
#
# Usage:
#   helm install field-content . -f values.yaml -f values-lite.yaml
#
# Or override in ArgoCD Application valuesFiles:
#   source:
#     helm:
#       valueFiles:
#         - values.yaml
#         - values-lite.yaml
#
# Estimated footprint:
#   Infra fixed: ~20-25 vCPU, ~30-40 Gi RAM, ~150 GB disk
#   Per user:    ~1.5 vCPU, ~1.5 Gi RAM (no DevSpaces)
#   30 users:    2-3 workers m5.4xlarge (16 vCPU, 64 Gi)
#
# What stays:  Kafka CDC pipeline, Developer Hub, Keycloak, Gitea,
#              ApplicationSets, Showroom, Registration
# What's off:  AI/ML, DevSpaces, Service Mesh, Observability stack,
#              MCP Gateway, Kuadrant, BPM workflows
# =============================================================================

userCount: 30

connectivityLink:
  operators:
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators

  apps:
    # --- Core infrastructure (always on) ---
    - id: namespaces
      enabled: true
      path: namespaces
      destinationNamespace: openshift-gitops
      syncWave: "1"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: openshift-gitops
      enabled: true
      path: openshift-gitops
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: operators
      enabled: true
      path: operators
      destinationNamespace: openshift-operators
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: rhbk
      enabled: true
      path: rhbk
      destinationNamespace: rhbk-operator
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: developer-hub
      enabled: true
      path: developer-hub
      destinationNamespace: developer-hub
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: oauth-users
      enabled: true
      path: oauth-users
      destinationNamespace: openshift-config
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: gitea
      enabled: true
      path: gitea
      destinationNamespace: gitea
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: applicationsets
      enabled: true
      path: applicationsets
      destinationNamespace: openshift-gitops
      syncWave: "4"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

    # --- Kafka CDC pipeline (core EDA demo) ---
    - id: kafka
      enabled: true
      path: kafka
      destinationNamespace: kafka-cdc
      syncWave: "4"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kafka-console
      enabled: true
      path: kafka-console
      destinationNamespace: kafka-cdc
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: apicurio-registry
      enabled: true
      path: apicurio-registry
      destinationNamespace: kafka-cdc
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: cdc-demo
      enabled: true
      path: cdc-demo
      destinationNamespace: kafka-cdc
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: camel-cdc
      enabled: true
      path: camel-cdc
      destinationNamespace: kafka-cdc
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

    # --- Demo app + workshop ---
    - id: console-links
      enabled: true
      path: console-links
      destinationNamespace: openshift-gitops
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: cleanup
      enabled: true
      path: cleanup
      destinationNamespace: kafka-cdc
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: workshop-registration
      enabled: true
      path: workshop-registration
      destinationNamespace: showroom
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false

    # --- Disabled in lite profile (saves ~30 vCPU, ~48 Gi RAM) ---
    - id: servicemeshoperator3
      enabled: false
      path: servicemeshoperator3
      destinationNamespace: openshift-operators
      syncWave: "3"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: rhcl-operator
      enabled: false
      path: rhcl-operator
      destinationNamespace: kuadrant-system
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: observability
      enabled: false
      path: observability
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kiali
