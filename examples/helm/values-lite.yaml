      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kogito-bpm
      enabled: false
      path: kogito-bpm
      destinationNamespace: kogito-bpm
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # --- Industrial Edge / Industrial Edge (disabled in lite) ---
    - id: industrial-edge-minio
      enabled: false
      path: industrial-edge-minio
      destinationNamespace: industrial-edge-ml-workspace
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-science-cluster
      enabled: false
