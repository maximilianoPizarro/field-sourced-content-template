{{- if .Values.showroom.enabled }}
---
# Showroom Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.showroom.namespace | default "showroom" }}
  labels:
    demo.redhat.com/application: "showroom"
---
# Showroom ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding (own namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-{{ .Values.showroom.name }}-sa
  namespace: {{ .Values.showroom.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — kafka-cdc namespace (pods, kafkaconnectors, etc.)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-kafka-cdc
  namespace: kafka-cdc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — kogito-bpm namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-kogito-bpm
  namespace: kogito-bpm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — observability namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-observability
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom Nginx ConfigMap
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-proxy-config
  namespace: {{ .Values.showroom.namespace }}
apiVersion: v1
data:
  nginx.conf: |
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;
      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }
      server {
        listen 8080;
        absolute_redirect off;
        location = /ui-config.yml {
          alias /etc/showroom/ui-config.yml;
          default_type text/yaml;
          expires off;
        }
        location = / {
          default_type text/html;
          root /etc/showroom;
          try_files /wrapper.html =404;
        }
        location = /runner/api/config {
          default_type application/json;
          return 200 '{"sessionUuid":"standalone","lifespanEnd":"2099-12-31T23:59:59Z","catalogItem":"Event-Driven Architecture Live"}';
        }
        location / {
          proxy_pass http://127.0.0.1:8000;
          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "gzip";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- if .Values.showroom.terminal.enabled }}
        location /terminal/ {
          proxy_pass http://127.0.0.1:7681;
          rewrite ^/terminal/(.*)$ /$1 break;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
        {{- end }}
      }
    }
---
# Showroom User Data ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-userdata
  namespace: {{ .Values.showroom.namespace }}
data:
  user_data.yml: |
    cluster_domain: {{ .Values.deployer.domain }}
    openshift_console_url: https://console-openshift-console.{{ .Values.deployer.domain }}
    openshift_cluster_ingress_domain: {{ .Values.deployer.domain }}
    user_name: '%USER_NAME%'
    user_password: '%USER_PASSWORD%'
    kafka_bootstrap: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092
    kafka_console_url: https://kafka-console-kafka-cdc.{{ .Values.deployer.domain }}
    apicurio_url: https://apicurio-registry-kafka-cdc.{{ .Values.deployer.domain }}
    grafana_url: https://grafana-observability.{{ .Values.deployer.domain }}
    mailpit_url: https://n8n-mailpit-openshift-lightspeed.{{ .Values.deployer.domain }}
    sonataflow_url: https://customer-onboarding-kogito-bpm.{{ .Values.deployer.domain }}
    devhub_url: https://backstage-developer-hub-developer-hub.{{ .Values.deployer.domain }}
    devspaces_url: https://devspaces.{{ .Values.deployer.domain }}
    gitea_url: https://gitea-gitea.{{ .Values.deployer.domain }}
    postgresql_host: cdc-postgresql.kafka-cdc.svc
    postgresql_user: cdcuser
    postgresql_db: cdcdb
---
# Showroom UI Config for Nookbag
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-ui-config
  namespace: {{ .Values.showroom.namespace }}
data:
  wrapper.html: |
    <!DOCTYPE html>
    <html>
    <head>
    <meta charset="utf-8">
    <title>Event-Driven Architecture Live | Red Hat Demo Platform</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;font-family:RedHatDisplay,Helvetica,sans-serif;display:flex;flex-direction:column;background:#151515}
    .hdr{display:flex;align-items:center;background:#151515;border-bottom:3px solid #c00;padding:0 16px;height:44px;flex-shrink:0}
    .hdr a.logo{display:flex;align-items:center;text-decoration:none}
    .hdr .t{color:#fff;font-size:13px;font-weight:500;margin-left:12px;border-left:1px solid #555;padding-left:12px}
    .hdr .r{margin-left:auto;display:flex;align-items:center;gap:4px}
    .hdr .r a{color:#73bcf7;font-size:10px;text-decoration:none;padding:3px 5px;border-radius:3px;position:relative}
    .hdr .r a:hover{background:rgba(255,255,255,.1)}
    .hdr .r a .tip{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:6px 10px;white-space:nowrap;font-size:10px;color:#ccc;margin-top:4px;z-index:100;pointer-events:none}
    .hdr .r a:hover .tip{display:block}
    .cbar{display:flex;align-items:center;background:#1a1a1a;border-bottom:1px solid #333;padding:0 16px;height:28px;flex-shrink:0;gap:16px;overflow-x:auto}
    .cbar span{color:#aaa;font-size:9px;white-space:nowrap}
    .cbar span b{color:#e0e0e0;font-weight:500}
    .ftr{display:flex;align-items:center;justify-content:center;background:#151515;border-top:2px solid #c00;padding:2px 16px;height:26px;flex-shrink:0;gap:16px}
    .ftr span{color:#999;font-size:10px}
    .ftr a{color:#73bcf7;text-decoration:none;font-size:10px}
    iframe{flex:1;min-height:0;border:0;width:100%}
    </style>
    </head>
    <body>
    <div class="hdr">
      <a class="logo" href="https://demo.redhat.com" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 613 145" height="24">
          <path d="M127.5 110.5c-2.8 3-6.4 5.3-10.3 6.7-9.8 3.6-20.4 2.8-29.6-2.2-6.1-3.2-11.1-8.1-14.4-14.1-1.4-2.5-2.5-5.2-3.3-7.9-.5-1.9-1-3.9-1.3-5.9-.3-2-.5-4-.6-6.1-.1-2.1 0-4.1.2-6.2.2-2 .5-4 1-6 .5-1.9 1.1-3.8 1.8-5.7 1.6-4.2 3.8-8.1 6.6-11.5 3.6-4.3 8.2-7.6 13.3-9.6 9.8-3.9 20.7-3.3 30 1.7 3.2 1.7 6 4 8.3 6.7l-9.5 9.2c-3.2-3.8-7.8-6.2-12.8-6.8-5-.5-10 .8-14 3.8-2.7 2-4.8 4.6-6.2 7.6-1.5 3.2-2.3 6.6-2.3 10.1-.1 3.7.6 7.3 2 10.7 1.2 2.9 3.1 5.5 5.5 7.5 4.5 3.8 10.5 5.3 16.3 4.1 3.7-.7 7-2.6 9.5-5.3l9.8 8.3z" fill="#e00"/>
          <path d="M62.3 72.5c0-25.3-12.2-42.2-32.6-50.3C25.1 20.2 19.2 19 12.8 19c-3 0-5.2.4-7 .8v103.4c1.8.4 4 .8 7 .8 6.4 0 12.3-1.2 16.9-3.2 20.4-8.1 32.6-25 32.6-48.3z" fill="#e00"/>
          <path d="M0 0v145h62.3V131c-2.8 1-6.2 1.6-10.4 1.6-1.6 0-3.2-.1-4.7-.3V12.7c1.5-.2 3.1-.3 4.7-.3 4.2 0 7.6.6 10.4 1.6V0H0z" fill="#e00"/>
        </svg>
      </a>
      <span class="t">Event-Driven Architecture Live</span>
      <div class="r">
        <a href="https://console-openshift-console.{{ .Values.deployer.domain }}" target="_blank">Console<span class="tip">OpenShift Console &mdash; Administracion del cluster</span></a>
        <a href="https://gitea-gitea.{{ .Values.deployer.domain }}" target="_blank">Gitea<span class="tip">Gitea &mdash; Servidor Git para repositorios del demo</span></a>
        <a href="https://devspaces.{{ .Values.deployer.domain }}" target="_blank">DevSpaces<span class="tip">Red Hat DevSpaces &mdash; IDE cloud con Kaoto pre-instalado</span></a>
        <a href="https://backstage-developer-hub-developer-hub.{{ .Values.deployer.domain }}" target="_blank">Developer Hub<span class="tip">Red Hat Developer Hub &mdash; Portal de desarrollo self-service</span></a>
        <a href="https://kafka-console-kafka-cdc.{{ .Values.deployer.domain }}" target="_blank">Kafka Console<span class="tip">Streams Console &mdash; Monitoreo de topics y consumer groups</span></a>
        <a href="https://grafana-observability.{{ .Values.deployer.domain }}" target="_blank">Grafana<span class="tip">Grafana &mdash; Dashboards de metricas del pipeline CDC</span></a>
      </div>
    </div>
    <div class="cbar">
      <span><b>Kafka</b> Streaming distribuido</span>
      <span><b>Debezium</b> CDC en tiempo real</span>
      <span><b>Camel</b> Integracion EIP</span>
      <span><b>Apicurio</b> Schema Registry</span>
      <span><b>SonataFlow</b> Workflows BPM</span>
      <span><b>Grafana</b> Observabilidad</span>
      <span><b>Service Mesh</b> mTLS + Kiali</span>
      <span><b>Developer Hub</b> Portal self-service</span>
      <span><b>DevSpaces</b> IDE cloud</span>
      <span><b>Lightspeed</b> IA para OpenShift</span>
    </div>
    <iframe src="/index.html" allow="clipboard-write clipboard-read"></iframe>
    <div class="ftr">
      <span>Red Hat Demo Platform &middot; <a href="https://demo.redhat.com" target="_blank">demo.redhat.com</a></span>
      <span>&middot;</span>
      <span>by <a href="https://maximilianopizarro.github.io" target="_blank">maximilianoPizarro</a></span>
    </div>
    </body>
    </html>
  ui-config.yml: |
    ---
    type: showroom
    default_width: 35
    persist_url_state: true
    antora:
      name: "event-driven-demo"
      version: "1.0"
    view_switcher:
      enabled: true
      default_mode: split
    tabs:
      - name: Terminal
        url: '/terminal/'
      - name: Developer Hub
        url: 'https://backstage-developer-hub-developer-hub.{{ .Values.deployer.domain }}'
      - name: Kafka Console
        url: 'https://kafka-console-kafka-cdc.{{ .Values.deployer.domain }}'
      - name: Console
        url: 'https://console-openshift-console.{{ .Values.deployer.domain }}'
        external: true
      - name: DevSpaces
        url: 'https://devspaces.{{ .Values.deployer.domain }}'
        external: true
      - name: Gitea
        url: 'https://gitea-gitea.{{ .Values.deployer.domain }}'
        external: true
      - name: Grafana
        url: 'https://grafana-observability.{{ .Values.deployer.domain }}'
        external: true
---
# Showroom PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.showroom.name }}-terminal-lab-user-home
  namespace: {{ .Values.showroom.namespace }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: "5Gi"
---
# Showroom Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
---
# Showroom Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  labels:
    demo.redhat.com/application: "showroom"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.showroom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.showroom.name }}
    spec:
      serviceAccountName: {{ .Values.showroom.name }}
      initContainers:
      - name: git-cloner
        image: "quay.io/rhpds/git-cloner:v1.1.2"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: CLONE_DIR
          value: "/showroom/repo"
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
      - name: antora-builder
        image: "quay.io/rhpds/antora:v1.0.1"
        env:
        - name: FILES_DIR
          value: "/showroom/repo"
        - name: OUTPUT_DIR
          value: "/showroom/www"
        - name: ANTORA_SITE_FILE
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
      - name: ui-config-copier
        image: "registry.access.redhat.com/ubi9/ubi-minimal:latest"
        command: ["sh", "-c", "cp /ui-config/ui-config.yml /showroom/www/ui-config.yml && echo 'ui-config.yml copied to www root'"]
        volumeMounts:
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        - mountPath: /ui-config
          name: ui-config
      - name: psql-installer
        image: "registry.access.redhat.com/ubi9/ubi:latest"
        command: ["bash", "-c"]
        args:
          - |
            dnf install -y --setopt=install_weak_deps=False postgresql >/dev/null 2>&1
            cp /usr/bin/psql /psql-bin/psql
            ldd /usr/bin/psql | grep '=>' | awk '{print $3}' | xargs -I{} cp -n {} /psql-bin/ 2>/dev/null || true
            echo "psql installed to shared volume"
        volumeMounts:
        - name: psql-bin
          mountPath: /psql-bin
      containers:
      - name: nginx
        image: "quay.io/rhpds/nginx:1.25"
        imagePullPolicy: "IfNotPresent"
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /etc/showroom/ui-config.yml
          name: ui-config
          subPath: ui-config.yml
        - mountPath: /etc/showroom/wrapper.html
          name: ui-config
          subPath: wrapper.html
        - mountPath: /var/cache/nginx
          name: nginx-cache
        - mountPath: /var/run
          name: nginx-pid
        ports:
        - name: web
          containerPort: 8080
      - name: content
        image: {{ .Values.showroom.content.image | quote }}
        imagePullPolicy: "IfNotPresent"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: ANTORA_PLAYBOOK
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        - name: DOMAIN
          value: {{ .Values.deployer.domain | quote }}
        {{- if .Values.showroom.nookbag.enabled }}
        - name: ZT_BUNDLE
          value: {{ .Values.showroom.nookbag.bundleUrl | quote }}
        - name: ZT_UI_ENABLED
          value: "true"
        - name: GUID
          value: {{ .Values.showroom.namespace | quote }}
        {{- end }}
        volumeMounts:
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        ports:
        - containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8000
        readinessProbe:
          httpGet:
            path: /
            port: 8000
      {{- if .Values.showroom.terminal.enabled }}
      - name: terminal
        image: {{ .Values.showroom.terminal.image | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PATH
          value: "/opt/psql:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: LD_LIBRARY_PATH
          value: "/opt/psql"
        volumeMounts:
        - name: terminal-lab-user-home
          mountPath: /home/lab-user
        - name: psql-bin
          mountPath: /opt/psql
        ports:
        - containerPort: 7681
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.showroom.terminal.resources.limits.cpu }}
            memory: {{ .Values.showroom.terminal.resources.limits.memory }}
          requests:
            cpu: {{ .Values.showroom.terminal.resources.requests.cpu }}
            memory: {{ .Values.showroom.terminal.resources.requests.memory }}
      {{- end }}
      volumes:
      - name: showroom-files
        emptyDir: {}
      - name: user-data
        configMap:
          name: {{ .Values.showroom.name }}-userdata
      - name: ui-config
        configMap:
          name: {{ .Values.showroom.name }}-ui-config
      - name: nginx-config
        configMap:
          defaultMode: 420
          name: {{ .Values.showroom.name }}-proxy-config
      - name: nginx-pid
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: psql-bin
        emptyDir: {}
      - name: terminal-lab-user-home
        persistentVolumeClaim:
          claimName: {{ .Values.showroom.name }}-terminal-lab-user-home
---
# Showroom Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    haproxy.router.openshift.io/timeout-tunnel: 1h
spec:
  to:
    kind: Service
    name: {{ .Values.showroom.name }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
