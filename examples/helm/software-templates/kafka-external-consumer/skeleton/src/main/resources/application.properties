# Kafka consumer configuration
mp.messaging.incoming.cdc-events.connector=smallrye-kafka
mp.messaging.incoming.cdc-events.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092}
mp.messaging.incoming.cdc-events.topic=${KAFKA_TOPIC:cdc.public.customers}
mp.messaging.incoming.cdc-events.group.id=${KAFKA_GROUP_ID:${{ values.consumerGroup }}}
mp.messaging.incoming.cdc-events.auto.offset.reset=earliest
mp.messaging.incoming.cdc-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.cdc-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.cdc-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.cdc-events.dead-letter-queue.topic=dlq.${KAFKA_TOPIC:cdc.public.customers}

# Health and metrics
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics
