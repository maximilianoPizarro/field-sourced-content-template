# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/maximilianoPizarro/field-sourced-content-template.git"
    repoRef: "main"
    antoraPlaybook: "showroom/site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  # Nookbag bundle - disabled for direct Antora rendering
  nookbag:
    enabled: false
    bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.2.1/nookbag-v0.2.1.zip"

  # Terminal configuration
  terminal:
    enabled: true
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

# Injected by parent chart
deployer:
  domain: ""

# Used by userdata ConfigMap (CDC demo variables are auto-derived from deployer.domain)
