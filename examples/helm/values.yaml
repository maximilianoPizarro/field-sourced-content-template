# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts (your fork or this template)
  repoUrl: "https://github.com/maximilianoPizarro/field-sourced-content-template.git"
  revision: "one"
  basePath: "examples/helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Connectivity Link (vendored from GitLab connectivity-link)
# One Argo CD Application per entry; paths under components/*
# ============================================================
connectivityLink:
  operators:
    channel: stable-4.20
    version: 4.20.4
    # servicemeshoperator3: templates/servicemeshoperator3.yaml (omit here to avoid duplicate)
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      # --- Industrial Edge / Industrial Edge operators ---
      - name: amq-broker-rhel8
        namespace: industrial-edge-tst-all
        channel: 7.12.x
        source: redhat-operators
      - name: camel-k
        namespace: openshift-operators
        channel: stable-v2
        source: community-operators
      - name: rhods-operator
        namespace: redhat-ods-operator
        channel: stable-3.3
        source: redhat-operators

  # Argo CD Applications (order via sync-wave on Application metadata)
  apps:
    - id: namespaces
      enabled: true
      path: namespaces
      destinationNamespace: openshift-gitops
      syncWave: "1"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: openshift-gitops
      enabled: true
      path: openshift-gitops
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: operators
      enabled: true
      path: operators
      destinationNamespace: openshift-operators
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: servicemeshoperator3
      enabled: true
      path: servicemeshoperator3
      destinationNamespace: openshift-operators
      syncWave: "3"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: rhbk
      enabled: true
      path: rhbk
      destinationNamespace: rhbk-operator
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: developer-hub
      enabled: true
      path: developer-hub
      destinationNamespace: developer-hub
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: rhcl-operator
      enabled: true
      path: rhcl-operator
      destinationNamespace: kuadrant-system
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: observability
      enabled: true
      path: observability
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kiali
      enabled: true
      path: kiali
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: opentelemetry
      enabled: true
      path: opentelemetry
      destinationNamespace: openshift-opentelemetry
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: litemaas
      enabled: false
      path: litemaas
      destinationNamespace: litemaas
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: openshift-ai
      enabled: true
      path: openshift-ai
      destinationNamespace: openshift-ai
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
      serverSideApply: false
    - id: devspaces
      enabled: true
      path: devspaces
      destinationNamespace: devspaces
      syncWave: "8"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: ols
      enabled: true
      path: openshift-lightspeed
      destinationNamespace: openshift-lightspeed
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: mcp-gateway
      enabled: true
      path: mcp-gateway
      destinationNamespace: mcp-system
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: gitea
      enabled: true
      path: gitea
      destinationNamespace: gitea
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: applicationsets
      enabled: true
      path: applicationsets
      destinationNamespace: openshift-gitops
      syncWave: "4"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: oauth-users
      enabled: true
      path: oauth-users
      destinationNamespace: openshift-config
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: workshop-registration
      enabled: true
      path: workshop-registration
      destinationNamespace: showroom
      syncWave: "11"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    # --- Kafka CDC Pipeline ---
    - id: kafka
      enabled: true
      path: kafka
      destinationNamespace: kafka-cdc
      syncWave: "4"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kafka-console
      enabled: true
      path: kafka-console
      destinationNamespace: kafka-cdc
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: apicurio-registry
      enabled: true
      path: apicurio-registry
      destinationNamespace: kafka-cdc
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: cdc-demo
      enabled: true
      path: cdc-demo
      destinationNamespace: kafka-cdc
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: camel-cdc
      enabled: true
      path: camel-cdc
      destinationNamespace: kafka-cdc
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # --- Kogito BPM (SonataFlow) ---
    - id: kogito-bpm
      enabled: true
      path: kogito-bpm
      destinationNamespace: kogito-bpm
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # --- Mailpit Email Testing ---
    - id: mailpit
      enabled: true
      path: mailpit
      destinationNamespace: openshift-lightspeed
      syncWave: "7"
      prune: true
      selfHeal: true
    # --- NeuroFace Computer Vision Pipeline ---
    - id: neuroface-cv
      enabled: true
      path: neuroface-cv
      destinationNamespace: kafka-cdc
      syncWave: "11"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

# ============================================================
# NeuroFace CV — PPE Detection Module (YOLO)
# ============================================================
neurofaceCv:
  ppe:
    enabled: false
    # --- OpenShift Console Links ---
    - id: console-links
      enabled: true
      path: console-links
      destinationNamespace: openshift-gitops
      syncWave: "11"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    # --- Automated Storage Cleanup ---
    - id: cleanup
      enabled: true
      path: cleanup
      destinationNamespace: kafka-cdc
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    # --- Industrial Edge / Industrial Edge Stack ---
    - id: industrial-edge-minio
      enabled: true
      path: industrial-edge-minio
      destinationNamespace: industrial-edge-ml-workspace
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-science-cluster
      enabled: true
      path: industrial-edge-data-science-cluster
      destinationNamespace: redhat-ods-applications
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-science-project
      enabled: true
      path: industrial-edge-data-science-project
      destinationNamespace: ml-development
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-lake
      enabled: true
      path: industrial-edge-data-lake
      destinationNamespace: industrial-edge-data-lake
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-tst
      enabled: true
      path: industrial-edge-tst
      destinationNamespace: industrial-edge-tst-all
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-stormshift
      enabled: true
      path: industrial-edge-stormshift
      destinationNamespace: industrial-edge-stormshift-messaging
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-pipelines
      enabled: true
      path: industrial-edge-pipelines
      destinationNamespace: industrial-edge-ci
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

# ============================================================
# Helm Chart Applications (deployed via ArgoCD Helm source)
# These install third-party charts from external Helm repos
# ============================================================
  helmApps:
    - id: gitea
      enabled: true
      repoURL: "https://dl.gitea.com/charts/"
      chart: gitea
      targetRevision: "12.5.0"
      destinationNamespace: gitea
      syncWave: "3"
      values:
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force
        gitea:
          admin:
            username: gitea_admin
            password: openshift
            email: admin@gitea.local
          config:
            server:
              ROOT_URL: ""
        image:
          rootless: true
        podSecurityContext:
          fsGroup: null
        containerSecurityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        initContainers:
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: true
        redis-cluster:
          enabled: false
        redis:
          enabled: true
        persistence:
          enabled: true
          size: 10Gi
        service:
          http:
            type: ClusterIP
            port: 3000

    - id: neuroface
      enabled: true
      repoURL: "https://maximilianopizarro.github.io/neuroface/"
      chart: neuroface
      targetRevision: "1.2.1"
      destinationNamespace: neuroface
      syncWave: "10"
      values:
        ovms:
          enabled: true
          externalUrl: "http://neuroface-ovms.neuroface.svc:8000"
          modelmesh:
            enabled: false
        litellm:
          enabled: false
        chat:
          enabled: true
          modelEndpoint: "http://granite-llm-metrics.neuroface.svc:8080"
          modelName: "granite-3.1-2b-instruct"
        persistence:
          enabled: true
          size: 1Gi

# ============================================================
# Lightspeed / MCP — LLM provider config for OLS component
# Keys are injected at deploy time (RHDP or --set), NOT in git
# ============================================================
lightspeed:
  llmApiKey: "sk-no-key"
  llmEndpoint: ""
  model: "qwen25-7b-instruct"

# ============================================================
# LiteMaaS / MaaS (optional — injected by RHDP when enabled on order)
# ============================================================
litemaas:
  apiUrl: ""
  apiKey: ""
  model: ""

# ============================================================
# User Scaling — single parameter controls all user provisioning
# Keycloak users, DevSpaces namespaces, RBAC policy, workshop registration
# Recommended: 30 (small), 50 (medium), 100 (large), 200 (extra-large)
# See README.md "Cluster Sizing" for node/resource recommendations
# ============================================================
userCount: 200

# ============================================================
# Workshop Registration Portal
# ============================================================
workshopRegistration:
  adminToken: "workshop-admin-2024"
  keycloakAdminPassword: ""

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation (single OLM subscription, template repo) ---
  operator:
    enabled: false
    name: web-terminal
    namespace: openshift-operators
    channel: fast
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  # --- Hello World Demo Application ---
  helloWorld:
    enabled: false
    namespace: terminal-demo
    appName: hello-world
    replicas: 1
    image: registry.redhat.io/ubi8/httpd-24:latest
    userInfo:
      enabled: true
      title: "Web Terminal Demo"
      instructions: "Access the Showroom lab guide, then click the terminal icon (>_) in the OpenShift console."

  # --- Showroom Lab Guide ---
  showroom:
    enabled: true
    namespace: showroom
    name: showroom
    observabilityAccess: true
    content:
      repoUrl: "https://github.com/maximilianoPizarro/field-sourced-content-template.git"
      repoRef: "one"
      antoraPlaybook: "showroom/site.yml"
      image: "quay.io/rhpds/showroom-content:v1.3.1"
    nookbag:
      enabled: true
      bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.3.2/nookbag-v0.3.2.zip"
    terminal:
      enabled: true
      image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: ""
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
