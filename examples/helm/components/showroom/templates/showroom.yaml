{{- if .Values.showroom.enabled }}
---
# Showroom Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.showroom.namespace | default "showroom" }}
  labels:
    demo.redhat.com/application: "showroom"
---
# Showroom ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding (own namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-{{ .Values.showroom.name }}-sa
  namespace: {{ .Values.showroom.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — kafka-cdc namespace (pods, kafkaconnectors, etc.)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-kafka-cdc
  namespace: kafka-cdc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — kogito-bpm namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-kogito-bpm
  namespace: kogito-bpm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding — observability namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-view-observability
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom Nginx ConfigMap
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-proxy-config
  namespace: {{ .Values.showroom.namespace }}
apiVersion: v1
data:
  nginx.conf: |
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;
      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }
      server {
        listen 8080;
        absolute_redirect off;
        location = /ui-config.yml {
          alias /etc/showroom/ui-config.yml;
          default_type text/yaml;
          expires off;
        }
        location = / {
          default_type text/html;
          root /etc/showroom;
          try_files /wrapper.html =404;
        }
        location = /runner/api/config {
          default_type application/json;
          return 200 '{"sessionUuid":"standalone","lifespanEnd":"2099-12-31T23:59:59Z","catalogItem":"Event-Driven Architecture Live"}';
        }
        location / {
          proxy_pass http://127.0.0.1:8000;
          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "gzip";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- if .Values.showroom.terminal.enabled }}
        location /terminal/ {
          proxy_pass http://127.0.0.1:7681;
          rewrite ^/terminal/(.*)$ /$1 break;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
        {{- end }}
      }
    }
---
# Showroom User Data ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-userdata
  namespace: {{ .Values.showroom.namespace }}
data:
  user_data.yml: |
    cluster_domain: {{ .Values.deployer.domain }}
    openshift_console_url: https://console-openshift-console.{{ .Values.deployer.domain }}
    openshift_cluster_ingress_domain: {{ .Values.deployer.domain }}
    user_name: '%USER_NAME%'
    user_password: '%USER_PASSWORD%'
    kafka_bootstrap: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092
    kafka_console_url: https://kafka-console-kafka-cdc.{{ .Values.deployer.domain }}
    apicurio_url: https://apicurio-registry-kafka-cdc.{{ .Values.deployer.domain }}
    grafana_url: https://grafana-observability.{{ .Values.deployer.domain }}
    mailpit_url: https://n8n-mailpit-openshift-lightspeed.{{ .Values.deployer.domain }}
    sonataflow_url: https://customer-onboarding-kogito-bpm.{{ .Values.deployer.domain }}
    devhub_url: https://backstage-developer-hub-developer-hub.{{ .Values.deployer.domain }}
    devspaces_url: https://devspaces.{{ .Values.deployer.domain }}
    gitea_url: https://gitea-gitea.{{ .Values.deployer.domain }}
    postgresql_host: cdc-postgresql.kafka-cdc.svc
    postgresql_user: cdcuser
    postgresql_db: cdcdb
---
# Showroom UI Config for Nookbag
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-ui-config
  namespace: {{ .Values.showroom.namespace }}
data:
  wrapper.html: |
    <!DOCTYPE html>
    <html>
    <head>
    <meta charset="utf-8">
    <title>Event-Driven Architecture Live | Red Hat Demo Platform</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#151515}
    iframe{width:100%;height:100%;border:0}
    </style>
    <script>
    (function(){
      var REGISTRATION_URL = 'https://workshop-registration.{{ .Values.deployer.domain }}/';
      var params = new URLSearchParams(window.location.search);
      var user = params.get('USER_NAME');
      if (user) {
        sessionStorage.setItem('EDA_USER_NAME', user);
        sessionStorage.setItem('EDA_CLUSTER_DOMAIN', params.get('CLUSTER_DOMAIN') || '');
      } else {
        user = sessionStorage.getItem('EDA_USER_NAME');
        if (user) {
          var domain = sessionStorage.getItem('EDA_CLUSTER_DOMAIN') || '';
          var fresh = window.location.pathname + '?USER_NAME=' + encodeURIComponent(user) + '&CLUSTER_DOMAIN=' + encodeURIComponent(domain);
          window.location.replace(fresh);
        } else {
          window.location.replace(REGISTRATION_URL);
        }
      }
    })();
    </script>
    </head>
    <body>
    <iframe id="sf" src="/index.html" allow="clipboard-write clipboard-read"></iframe>
    <script>
    document.getElementById('sf').addEventListener('load', function(){
      try {
        var d = this.contentDocument || this.contentWindow.document;
        var hdr = d.querySelector('.topbar, header, .navbar, [class*="toolbar"]');
        if (!hdr) return;
        var pp = new URLSearchParams(window.location.search);
        var u = pp.get('USER_NAME') || '';
        var domain = '{{ .Values.deployer.domain }}';
        var box = d.createElement('div');
        box.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:10px;padding-right:12px;';
        if (u) {
          var badge = d.createElement('span');
          badge.style.cssText = 'background:#c00;color:#fff;padding:2px 10px;border-radius:3px;font-weight:600;font-size:12px;';
          badge.textContent = u;
          box.appendChild(badge);
          var creds = d.createElement('span');
          creds.style.cssText = 'color:#aaa;font-size:10px;';
          creds.textContent = 'Pass: Welcome123!';
          box.appendChild(creds);
        }
        var reg = d.createElement('a');
        reg.href = '#';
        reg.textContent = 'Registro';
        reg.style.cssText = 'color:#ee0;font-size:11px;text-decoration:none;border-left:1px solid #555;padding-left:10px;margin-left:4px;font-weight:500;';
        reg.onclick = function(){ sessionStorage.clear(); window.location.href='https://workshop-registration.'+domain+'/'; return false; };
        box.appendChild(reg);
        var brand = hdr.querySelector('.navbar-brand, [class*="brand"], [class*="title"]');
        if (brand) { brand.style.width='auto'; brand.appendChild(box); }
        else { hdr.appendChild(box); }
      } catch(e){}
    });
    </script>
    </body>
    </html>
  ui-config.yml: |
    ---
    type: showroom
    default_width: 35
    persist_url_state: true
    antora:
      name: "event-driven-demo"
      version: "1.0"
    view_switcher:
      enabled: true
      default_mode: split
    tabs:
      - name: Terminal
        url: '/terminal/'
      - name: Developer Hub
        url: 'https://backstage-developer-hub-developer-hub.{{ .Values.deployer.domain }}'
      - name: Kafka Console
        url: 'https://kafka-console-kafka-cdc.{{ .Values.deployer.domain }}'
      - name: Console
        url: 'https://console-openshift-console.{{ .Values.deployer.domain }}'
        external: true
      - name: DevSpaces
        url: 'https://devspaces.{{ .Values.deployer.domain }}'
        external: true
      - name: Gitea
        url: 'https://gitea-gitea.{{ .Values.deployer.domain }}'
        external: true
      - name: Grafana
        url: 'https://grafana-observability.{{ .Values.deployer.domain }}'
        external: true
---
# Showroom PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.showroom.name }}-terminal-lab-user-home
  namespace: {{ .Values.showroom.namespace }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: "5Gi"
---
# Showroom Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
---
# Showroom Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  labels:
    demo.redhat.com/application: "showroom"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.showroom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.showroom.name }}
    spec:
      serviceAccountName: {{ .Values.showroom.name }}
      initContainers:
      - name: git-cloner
        image: "quay.io/rhpds/git-cloner:v1.1.2"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: CLONE_DIR
          value: "/showroom/repo"
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
      - name: antora-builder
        image: "quay.io/rhpds/antora:v1.0.1"
        env:
        - name: FILES_DIR
          value: "/showroom/repo"
        - name: OUTPUT_DIR
          value: "/showroom/www"
        - name: ANTORA_SITE_FILE
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
      - name: ui-config-copier
        image: "registry.access.redhat.com/ubi9/ubi-minimal:latest"
        command: ["sh", "-c", "cp /ui-config/ui-config.yml /showroom/www/ui-config.yml && echo 'ui-config.yml copied to www root'"]
        volumeMounts:
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        - mountPath: /ui-config
          name: ui-config
      - name: psql-installer
        image: "registry.redhat.io/rhel9/postgresql-16:latest"
        command: ["bash", "-c"]
        args:
          - |
            mkdir -p /psql-bin/lib
            cp /usr/bin/psql /psql-bin/psql.real && chmod +x /psql-bin/psql.real
            for lib in $(ldd /usr/bin/psql 2>/dev/null | grep '=>' | awk '{print $3}'); do
              base=$(basename "$lib")
              case "$base" in libpq*|libreadline*|libtinfo*) cp -n "$lib" /psql-bin/lib/ 2>/dev/null ;; esac
            done
            cat > /psql-bin/psql <<'WRAPPER'
            #!/bin/bash
            exec env LD_LIBRARY_PATH=/opt/psql/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH} /opt/psql/psql.real "$@"
            WRAPPER
            chmod +x /psql-bin/psql
            echo "psql installed: $(/psql-bin/psql.real --version 2>/dev/null)"
        volumeMounts:
        - name: psql-bin
          mountPath: /psql-bin
      containers:
      - name: nginx
        image: "quay.io/rhpds/nginx:1.25"
        imagePullPolicy: "IfNotPresent"
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /etc/showroom/ui-config.yml
          name: ui-config
          subPath: ui-config.yml
        - mountPath: /etc/showroom/wrapper.html
          name: ui-config
          subPath: wrapper.html
        - mountPath: /var/cache/nginx
          name: nginx-cache
        - mountPath: /var/run
          name: nginx-pid
        ports:
        - name: web
          containerPort: 8080
      - name: content
        image: {{ .Values.showroom.content.image | quote }}
        imagePullPolicy: "IfNotPresent"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: ANTORA_PLAYBOOK
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        - name: DOMAIN
          value: {{ .Values.deployer.domain | quote }}
        {{- if .Values.showroom.nookbag.enabled }}
        - name: ZT_BUNDLE
          value: {{ .Values.showroom.nookbag.bundleUrl | quote }}
        - name: ZT_UI_ENABLED
          value: "true"
        - name: GUID
          value: {{ .Values.showroom.namespace | quote }}
        {{- end }}
        volumeMounts:
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        ports:
        - containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8000
        readinessProbe:
          httpGet:
            path: /
            port: 8000
      {{- if .Values.showroom.terminal.enabled }}
      - name: terminal
        image: {{ .Values.showroom.terminal.image | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PATH
          value: "/opt/psql:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        volumeMounts:
        - name: terminal-lab-user-home
          mountPath: /home/lab-user
        - name: psql-bin
          mountPath: /opt/psql
        ports:
        - containerPort: 7681
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.showroom.terminal.resources.limits.cpu }}
            memory: {{ .Values.showroom.terminal.resources.limits.memory }}
          requests:
            cpu: {{ .Values.showroom.terminal.resources.requests.cpu }}
            memory: {{ .Values.showroom.terminal.resources.requests.memory }}
      {{- end }}
      volumes:
      - name: showroom-files
        emptyDir: {}
      - name: user-data
        configMap:
          name: {{ .Values.showroom.name }}-userdata
      - name: ui-config
        configMap:
          name: {{ .Values.showroom.name }}-ui-config
      - name: nginx-config
        configMap:
          defaultMode: 420
          name: {{ .Values.showroom.name }}-proxy-config
      - name: nginx-pid
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: psql-bin
        emptyDir: {}
      - name: terminal-lab-user-home
        persistentVolumeClaim:
          claimName: {{ .Values.showroom.name }}-terminal-lab-user-home
---
# Showroom Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    haproxy.router.openshift.io/timeout-tunnel: 1h
spec:
  to:
    kind: Service
    name: {{ .Values.showroom.name }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
