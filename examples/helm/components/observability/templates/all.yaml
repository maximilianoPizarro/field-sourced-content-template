            {"expr": "sum(rate(kafka_topic_partition_current_offset{namespace=\"industrial-edge-data-lake\", topic=~\"factory-kafka-cluster.*\"}[5m])) by (topic)", "legendFormat": "replicated: {{`{{topic}}`}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 15, "lineWidth": 2, "showPoints": "never"}}}
