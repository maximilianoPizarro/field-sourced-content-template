apiVersion: sonataflow.org/v1alpha08
kind: SonataFlowPlatform
metadata:
  name: sonataflow-platform
  namespace: kogito-bpm
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  build:
    config:
      strategyOptions:
        KanikoBuildCacheEnabled: "true"
  devMode:
    baseImage: registry.redhat.io/openshift-serverless-1/logic-swf-devmode-rhel8:1.36
  services:
    dataIndex:
      enabled: true
      podTemplate:
        container:
          env:
          - name: QUARKUS_HTTP_CORS
            value: "true"
          - name: QUARKUS_HTTP_CORS_ORIGINS
            value: "/.*/"
          - name: QUARKUS_HTTP_CORS_METHODS
            value: "GET,POST,OPTIONS"
          - name: QUARKUS_HTTP_CORS_HEADERS
            value: "content-type,Accept,Authorization"
          - name: QUARKUS_HTTP_CORS_EXPOSED_HEADERS
            value: "Content-Type"
          - name: QUARKUS_OIDC_ENABLED
            value: "false"
          - name: QUARKUS_OIDC_TENANT_ENABLED
            value: "false"
    jobService:
      enabled: true
---
apiVersion: sonataflow.org/v1alpha08
kind: SonataFlow
metadata:
  name: customer-onboarding
  namespace: kogito-bpm
  annotations:
    sonataflow.org/description: "Customer Onboarding BPM - triggered by CDC events from Kafka"
    sonataflow.org/version: "1.0.0"
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: customer-onboarding
    app.kubernetes.io/part-of: kogito-bpm
    app.openshift.io/runtime: kogito
spec:
  flow:
    start: ReceiveCDCEvent
    events:
      - name: cdcCustomerEvent
        type: cdc.public.customers
        source: debezium/cdc
      - name: approvalCompleted
        type: approval.completed
        source: internal
    functions:
      - name: classifyCustomer
        type: expression
        operation: |
          {tier: (if .customer.amount >= 50000 then "premium" elif .customer.amount >= 10000 then "standard" else "basic" end)}
      - name: logEvent
        type: custom
        operation: sysout
      - name: buildApprovalPayload
        type: expression
        operation: |
          {approval_request: {customer_id: .customer.id, name: "\(.customer.first_name) \(.customer.last_name)", email: .customer.email, tier: .tier, status: "pending_approval"}}
      - name: buildWelcomePayload
        type: expression
        operation: |
          {notification: {to: .customer.email, subject: "Welcome to NeuralBank", body: "Hello \(.customer.first_name), your \(.tier) account is ready."}}
      - name: buildRejectionPayload
        type: expression
        operation: |
          {notification: {to: .customer.email, subject: "Application Under Review", body: "Dear \(.customer.first_name), your premium account requires additional review."}}
      - name: buildMetricPayload
        type: expression
        operation: |
          {metric: {event_type: "customer_onboarded", customer_id: .customer.id, tier: .tier}}
    states:
      - name: ReceiveCDCEvent
        type: event
        onEvents:
          - eventRefs:
              - cdcCustomerEvent
            eventDataFilter:
              data: ".payload.after"
              toStateData: ".customer"
        transition: ValidateCustomerData

      - name: ValidateCustomerData
        type: switch
        dataConditions:
          - condition: ".customer.email != null and .customer.first_name != null"
            name: ValidData
            transition: ClassifyCustomer
          - condition: ".customer.email == null or .customer.first_name == null"
            name: InvalidData
            transition: HandleInvalidData
        defaultCondition:
          transition: HandleInvalidData

      - name: HandleInvalidData
        type: operation
        actions:
          - name: logInvalidData
            functionRef:
              refName: logEvent
              arguments:
                message: "Invalid customer data received"
        end: true

      - name: ClassifyCustomer
        type: operation
        actions:
          - name: classify
            functionRef:
              refName: classifyCustomer
            actionDataFilter:
              toStateData: ".tier"
        transition: CheckApprovalRequired

      - name: CheckApprovalRequired
        type: switch
        dataConditions:
          - condition: '.tier == "premium"'
            name: NeedsApproval
            transition: RequestManagerApproval
          - condition: '.tier != "premium"'
            name: AutoApproved
            transition: ProvisionAccount
        defaultCondition:
          transition: ProvisionAccount

      - name: RequestManagerApproval
        type: callback
        action:
          name: requestApproval
          functionRef:
            refName: buildApprovalPayload
        eventRef: approvalCompleted
        eventDataFilter:
          data: ".approved"
          toStateData: ".approval_result"
        timeouts:
          eventTimeout: PT24H
        transition: EvaluateApproval

      - name: EvaluateApproval
        type: switch
        dataConditions:
          - condition: ".approval_result == true"
            name: Approved
            transition: ProvisionAccount
          - condition: ".approval_result != true"
            name: Rejected
            transition: NotifyRejection
        defaultCondition:
          transition: NotifyRejection

      - name: NotifyRejection
        type: operation
        actions:
          - name: buildRejection
            functionRef:
              refName: buildRejectionPayload
          - name: logRejection
            functionRef:
              refName: logEvent
              arguments:
                message: "Customer rejected"
        end: true

      - name: ProvisionAccount
        type: parallel
        branches:
          - name: CreateAccount
            actions:
              - name: logProvisioning
                functionRef:
                  refName: logEvent
                  arguments:
                    message: "Provisioning account"
          - name: PrepareWelcome
            actions:
              - name: buildWelcome
                functionRef:
                  refName: buildWelcomePayload
        completionType: allOf
        transition: EmitOnboardingMetric

      - name: EmitOnboardingMetric
        type: operation
        actions:
          - name: buildMetric
            functionRef:
              refName: buildMetricPayload
          - name: logMetric
            functionRef:
              refName: logEvent
              arguments:
                message: "Onboarding complete"
        end: true
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: bpm.approval.requests
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: bpm.onboarding.metrics
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-onboarding-props
  namespace: kogito-bpm
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  labels:
    app: customer-onboarding
data:
  application.properties: |
    quarkus.http.cors=true
    quarkus.http.cors.origins=/.*/
