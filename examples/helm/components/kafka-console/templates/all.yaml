apiVersion: console.streamshub.github.com/v1alpha1
kind: Console
metadata:
  name: kafka-console
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostname: kafka-console-kafka-cdc.{{ .Values.clusterDomain }}
  kafkaClusters:
    - name: cdc-cluster
      namespace: kafka-cdc
      listener: plain
    - name: dev-cluster
      namespace: industrial-edge-tst-all
      listener: plain
    - name: factory-cluster
      namespace: industrial-edge-stormshift-messaging
      listener: plain
    - name: prod-cluster
      namespace: industrial-edge-data-lake
      listener: plain
  kafkaConnectClusters:
    - name: cdc-connect
      namespace: kafka-cdc
      url: http://cdc-connect-connect-api.kafka-cdc.svc:8083
      kafkaClusters:
        - kafka-cdc/cdc-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-console-connect-access
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkaconnects", "kafkaconnectors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-console-connect-access
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: kafka-console-console-serviceaccount
    namespace: kafka-cdc
roleRef:
  kind: Role
  name: kafka-console-connect-access
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-console-kafka-access
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkas", "kafkatopics", "kafkausers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-console-kafka-access
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
