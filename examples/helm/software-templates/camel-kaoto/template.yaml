apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: camel-kaoto-cdc-route
  title: "Camel CDC Route (Kaoto)"
  description: "Create a Camel route for CDC event processing with Kaoto visual designer in DevSpaces"
  tags:
    - camel
    - kaoto
    - cdc
    - kafka
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Project Configuration
      required:
        - name
        - owner
      properties:
        name:
          title: Name
          type: string
          description: Unique name for the Camel route project
          ui:autofocus: true
          default: "my-camel-cdc-route"
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
              - User
        description:
          title: Description
          type: string
          description: Description of the Camel route
          default: "CDC event processing route using Apache Camel with Kaoto visual designer"
    - title: Kafka Configuration
      properties:
        kafkaBootstrap:
          title: Kafka Bootstrap Server
          type: string
          default: "cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092"
        kafkaTopic:
          title: Source Kafka Topic
          type: string
          default: "cdc.public.customers"
  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          kafkaBootstrap: ${{ parameters.kafkaBootstrap }}
          kafkaTopic: ${{ parameters.kafkaTopic }}

    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: gitea-gitea.${{ steps.fetch.output.clusterDomain || 'apps.cluster-l9nhj.dynamic.redhatworkshops.io' }}?repo=${{ parameters.name }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in DevSpaces
        icon: catalog
        url: "https://devspaces.${{ steps.fetch.output.clusterDomain || 'apps.cluster-l9nhj.dynamic.redhatworkshops.io' }}/#${{ steps.publish.output.remoteUrl }}"
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
