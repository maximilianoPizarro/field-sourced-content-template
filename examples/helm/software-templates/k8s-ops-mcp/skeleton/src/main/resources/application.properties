quarkus.application.name=${{ values.name }}
quarkus.mcp.server.server-info.name=${{ values.name }}
quarkus.mcp.server.server-info.version=1.0.0

# Kubernetes client - uses ServiceAccount token automatically in-cluster
quarkus.kubernetes-client.trust-certs=true

# Target namespaces for monitoring
k8s.target.namespaces=${{ values.targetNamespaces }}

quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
