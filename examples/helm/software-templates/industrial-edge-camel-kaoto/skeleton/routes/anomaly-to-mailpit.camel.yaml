- route:
    id: anomaly-alert-to-mailpit
    description: "Consumes anomaly detection results from Kafka and sends email alerts via Mailpit"
    from:
      uri: kafka:iot-sensor-sw-vibration
      parameters:
        brokers: ${{ values.kafkaBrokerUri }}
        groupId: camel-kaoto-anomaly-alert
        autoOffsetReset: latest
        valueDeserializer: org.apache.kafka.common.serialization.StringDeserializer
      steps:
        - log:
            message: "Anomaly check — vibration data: ${body}"
        - setHeader:
            name: sensorPayload
            simple: "${body}"
        - choice:
            when:
              - simple: "${body.split(',')[2]} > 15.0"
                steps:
                  - log:
                      message: "ANOMALY DETECTED — vibration ${headers.sensorPayload.split(',')[2]} exceeds threshold"
                  - setBody:
                      simple: >
                        {"from":{"name":"Industrial Edge Alerts","email":"alerts@industrial-edge.io"},
                         "to":[{"name":"Operations","email":"ops@industrial-edge.io"}],
                         "subject":"Vibration Anomaly — ${headers.sensorPayload.split(',')[0]} — ${date:now:yyyy-MM-dd HH:mm:ss}",
                         "text":"Anomaly: vibration=${headers.sensorPayload.split(',')[2]} from machine=${headers.sensorPayload.split(',')[0]} sensor=${headers.sensorPayload.split(',')[1]}",
                         "html":"<div style='font-family:sans-serif;max-width:500px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#c9190b;padding:16px;text-align:center'><h2 style='color:#fff;margin:0'>Vibration Anomaly</h2></div><div style='padding:24px'><p><b>Time:</b> ${date:now:yyyy-MM-dd HH:mm:ss}</p><p><b>Machine:</b> ${headers.sensorPayload.split(',')[0]}</p><p><b>Sensor:</b> ${headers.sensorPayload.split(',')[1]}</p><p><b>Vibration:</b> ${headers.sensorPayload.split(',')[2]}</p><p><b>Action:</b> Review machine immediately</p></div></div>"}
                  - setHeader:
                      name: Content-Type
                      constant: application/json
                  - to:
                      uri: ${{ values.mailpitApiUrl }}/api/v1/send
                      parameters:
                        httpMethod: POST
                  - log:
                      message: "Anomaly alert email sent to Mailpit"
            otherwise:
              steps:
                - log:
                    message: "Vibration within normal range — no alert"
- route:
    id: periodic-health-report
    description: "Sends a periodic health report to Mailpit every 5 minutes"
    from:
      uri: timer:health-report
      parameters:
        period: "300000"
      steps:
        - setBody:
            simple: >
              {"from":{"name":"Industrial Edge Health","email":"health@industrial-edge.io"},
               "to":[{"name":"ML Ops","email":"mlops@industrial-edge.io"}],
               "subject":"IE Health Report — ${date:now:yyyy-MM-dd HH:mm}",
               "text":"All Camel routes running. Timestamp: ${date:now:yyyy-MM-dd HH:mm:ss}",
               "html":"<div style='font-family:sans-serif;padding:24px'><h3 style='color:#3e8635'>All Industrial Edge Routes Healthy</h3><p>Timestamp: ${date:now:yyyy-MM-dd HH:mm:ss}</p><ul><li>mqtt-to-kafka: active</li><li>kafka-to-s3: active</li><li>anomaly-alerts: active</li></ul></div>"}
        - setHeader:
            name: Content-Type
            constant: application/json
        - to:
            uri: ${{ values.mailpitApiUrl }}/api/v1/send
            parameters:
              httpMethod: POST
        - log:
            message: "Health report sent to Mailpit"
