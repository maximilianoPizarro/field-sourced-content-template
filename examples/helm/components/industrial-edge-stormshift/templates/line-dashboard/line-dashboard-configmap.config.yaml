apiVersion: v1
kind: ConfigMap
metadata:
  name: line-dashboard-configmap
  namespace: industrial-edge-stormshift-line-dashboard
  labels:
    app.kubernetes.io/instance: industrial-edge-stormshift
data:
  "config.json": |-
    {
      "websocketHost": "https://messaging-industrial-edge-stormshift-messaging.{{ .Values.global.localClusterDomain }}",
      "websocketPath": "/api/service-web/socket",
      "SERVER_TIMEOUT": "20000"
    }
