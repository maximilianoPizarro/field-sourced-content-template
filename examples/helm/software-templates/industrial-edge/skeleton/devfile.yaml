schemaVersion: 2.2.2
metadata:
  name: ${{values.uniqueName}}
  version: 1.0.0
  displayName: "Industrial Edge — ${{values.name}}"
  description: IoT manufacturing platform with Camel K integrations, Kaoto designer, and JBang
  language: java
  projectType: camel
  tags:
    - Camel
    - Kaoto
    - Industrial-Edge
    - IoT
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "redhat.vscode-kaoto",
        "redhat.vscode-apache-camel",
        "redhat.vscode-yaml",
        "redhat.java",
        "redhat.vscode-quarkus",
        "jbangdev.jbang-vscode",
        "redhat.vscode-openshift-connector",
        "Continue.continue"
      ]
    }
  .vscode/settings.json: |
    {
      "kaoto.catalog.version": "4.12.0",
      "files.associations": {
        "*.java": "java"
      }
    }
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 3Gi
      cpuLimit: "2"
      mountSources: true
      env:
        - name: MQTT_BROKER_URI
          value: "tcp://broker-amq-mqtt-all-0-svc.${{values.namespace}}.svc:61616"
        - name: KAFKA_BROKER_URI
          value: "${{values.uniqueName}}-cluster-kafka-bootstrap.${{values.namespace}}.svc:9092"
        - name: NAMESPACE
          value: "${{values.namespace}}"
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: install-extensions
    exec:
      component: tools
      commandLine: |
        export LD_LIBRARY_PATH=/checode/checode-linux-libc/ubi9/ld_libs:/checode/checode-linux-libc/ubi9/ld_libs/openssl:/checode/checode-linux-libc/ubi9/ld_libs/core:/usr/lib64
        CHE_CODE=/checode/checode-linux-libc/ubi9/bin/che-code
        EXT_DIR=/checode/checode-linux-libc/ubi9/extensions
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-kaoto --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-apache-camel --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension Continue.continue --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-yaml --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.java --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-quarkus --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-openshift-connector --force 2>/dev/null || true
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension jbangdev.jbang-vscode --force 2>/dev/null || true
        which jbang >/dev/null 2>&1 || curl -Ls https://sh.jbang.dev | bash -s - app setup
  - id: setup-continue
    exec:
      component: tools
      commandLine: |
        mkdir -p /home/user/.continue
        cp /projects/${{values.uniqueName}}/continue-config.json /home/user/.continue/config.json
        if [ -n "$CONTINUE_API_KEY" ]; then
          sed -i "s|CONTINUE_API_KEY_PLACEHOLDER|$CONTINUE_API_KEY|g" /home/user/.continue/config.json
        fi
        if [ -n "$CONTINUE_API_BASE" ]; then
          sed -i "s|https://litellm-prod.apps.maas.redhatworkshops.io/v1|$CONTINUE_API_BASE|g" /home/user/.continue/config.json
        fi
        if [ -n "$CONTINUE_MODEL" ]; then
          sed -i "s|deepseek-r1-distill-qwen-14b|$CONTINUE_MODEL|g" /home/user/.continue/config.json
        fi
  - id: run-camel
    exec:
      component: tools
      commandLine: "jbang camel@apache/camel run src/MQTT2KafkaRoute.java"
      workingDir: ${PROJECT_SOURCE}
events:
  postStart:
    - install-extensions
    - setup-continue
