{%- if values.anomalyDetection %}
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: anomaly-detection-model-server
  namespace: ${{values.namespace}}
  labels:
    name: modelmesh-serving-mlserver-1.x-SR
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/template-display-name: ML Server
    opendatahub.io/template-name: mlserver
spec:
  supportedModelFormats:
    - name: sklearn
      version: "0"
      autoSelect: true
    - name: xgboost
      version: "1"
      autoSelect: true
    - name: lightgbm
      version: "3"
      autoSelect: true
  builtInAdapter:
    serverType: mlserver
    runtimeManagementPort: 8001
    memBufferBytes: 134217728
    modelLoadingTimeoutMillis: 90000
  containers:
    - name: mlserver
      image: quay.io/opendatahub/mlserver:1.3.1
      env:
        - name: MLSERVER_MODELS_DIR
          value: /models/_mlserver_models/
        - name: MLSERVER_GRPC_PORT
          value: "8001"
        - name: MLSERVER_HTTP_PORT
          value: "8002"
        - name: MLSERVER_LOAD_MODELS_AT_STARTUP
          value: "false"
        - name: MLSERVER_MODEL_NAME
          value: dummy-model-fixme
        - name: MLSERVER_HOST
          value: "127.0.0.1"
        - name: MLSERVER_GRPC_MAX_MESSAGE_LENGTH
          value: "-1"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  protocolVersions:
    - grpc-v2
  grpcEndpoint: "port:8085"
  grpcDataEndpoint: "port:8001"
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
  multiModel: true
  replicas: 1
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-connection-user-bucket
  namespace: ${{values.namespace}}
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: MinIO S3
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123
  AWS_DEFAULT_REGION: none
  AWS_S3_BUCKET: user-bucket
  AWS_S3_ENDPOINT: "http://minio.${{values.namespace}}.svc:9000"
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: inference-service
  namespace: ${{values.namespace}}
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    serving.kserve.io/deploymentMode: ModelMesh
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  predictor:
    model:
      modelFormat:
        name: sklearn
        version: "0"
      runtime: anomaly-detection-model-server
      storage:
        key: aws-connection-user-bucket
        path: initial_model.joblib
{%- else %}
# Anomaly detection disabled — no ML resources deployed
{%- endif %}
