# Management Console — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonataflow-management-console
  namespace: kogito-bpm
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app: sonataflow-management-console
    app.kubernetes.io/part-of: kogito-bpm
    app.openshift.io/runtime: kogito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonataflow-management-console
  template:
    metadata:
      labels:
        app: sonataflow-management-console
    spec:
      containers:
      - name: management-console
        image: registry.redhat.io/openshift-serverless-1/logic-management-console-rhel8:1.36.0
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: SONATAFLOW_MANAGEMENT_CONSOLE_DATA_INDEX_ENDPOINT
          value: "https://sonataflow-data-index-kogito-bpm.{{ .Values.clusterDomain }}/graphql"
        - name: SONATAFLOW_MANAGEMENT_CONSOLE_KOGITO_ENV_MODE
          value: "DEV"
        - name: KOGITO_CONSOLES_KEYCLOAK_DISABLE_HEALTH_CHECK
          value: "true"
        - name: KOGITO_CONSOLES_KEYCLOAK_HEALTH_CHECK_URL
          value: ""
        - name: KOGITO_CONSOLES_KEYCLOAK_CLIENT_ID
          value: "sonataflow-management-console"
        - name: KOGITO_CONSOLES_KEYCLOAK_REALM
          value: "master"
        - name: KOGITO_CONSOLES_KEYCLOAK_URL
          value: ""
        - name: KOGITO_CONSOLES_KEYCLOAK_UPDATE_TOKEN_VALIDITY
          value: "30"
        volumeMounts:
        - name: env-json
          mountPath: /home/kogito/management-console/app/env.json
          subPath: env.json
        - name: schema-json
          mountPath: /home/kogito/management-console/EnvJson.schema.json
          subPath: EnvJson.schema.json
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: env-json
        configMap:
          name: sonataflow-console-envjson
      - name: schema-json
        configMap:
          name: sonataflow-console-schema
---
