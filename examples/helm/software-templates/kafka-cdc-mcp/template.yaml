apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: kafka-cdc-mcp-server
  title: "Kafka CDC Pipeline MCP Server"
  description: "Creates an MCP server with Quarkus that provides AI-accessible tools for the Kafka CDC pipeline. Includes tools to list Kafka topics, read CDC events, query consumer group lag, browse Apicurio Registry schemas, and trigger test CDC events via PostgreSQL. Connects to the live AMQ Streams cluster and Apicurio Registry deployed in the kafka-cdc namespace."
  tags:
    - java
    - quarkus
    - mcp
    - kafka
    - cdc
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Application Information
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the MCP service
          default: kafka-cdc-mcp
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "MCP server for Kafka CDC pipeline operations"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-apps"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-apps"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: ""
          ui:widget: hidden
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-apps"
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
          clusterDomain: ${{ parameters.clusterDomain }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Open in DevSpaces
        icon: chat
        url: "https://devspaces.${{ parameters.clusterDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}"
