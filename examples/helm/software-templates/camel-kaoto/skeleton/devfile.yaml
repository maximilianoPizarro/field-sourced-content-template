schemaVersion: 2.2.2
metadata:
  name: ${{ values.name }}
  version: 1.0.0
  displayName: Camel CDC Route
  description: Apache Camel CDC route with Kaoto visual designer + Continue AI (Granite via OpenShift AI)
  language: yaml
  projectType: camel
  tags:
    - Camel
    - Kaoto
    - CDC
    - Kafka
    - AI
    - Continue
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "redhat.vscode-kaoto",
        "redhat.vscode-apache-camel",
        "redhat.vscode-yaml",
        "redhat.vscode-xml",
        "redhat.java",
        "redhat.vscode-quarkus",
        "jbangdev.jbang-vscode",
        "redhat.vscode-openshift-connector",
        "Continue.continue"
      ]
    }
projects:
  - name: ${{ values.name }}
    git:
      remotes:
        origin: https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}.git
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 1Gi
commands:
  - id: install-extensions
    exec:
      component: tools
      commandLine: |
        export LD_LIBRARY_PATH=/checode/checode-linux-libc/ubi8/ld_libs:/usr/lib64
        CHE_CODE=/checode/checode-linux-libc/ubi8/bin/che-code
        EXT_DIR=/checode/checode-linux-libc/extensions
        mkdir -p /home/user/.vsix-cache
        [ -f /home/user/.vsix-cache/kaoto.vsix ] || \
          curl -sL "https://redhat.gallerycdn.vsassets.io/extensions/redhat/vscode-kaoto/2.10.2/1775215869920/Microsoft.VisualStudio.Services.VSIXPackage" -o /home/user/.vsix-cache/kaoto.vsix
        [ -f /home/user/.vsix-cache/camel.vsix ] || \
          curl -sL "https://redhat.gallerycdn.vsassets.io/extensions/redhat/vscode-apache-camel/1.14.0/1758543062217/Microsoft.VisualStudio.Services.VSIXPackage" -o /home/user/.vsix-cache/camel.vsix
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension /home/user/.vsix-cache/kaoto.vsix --force
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension /home/user/.vsix-cache/camel.vsix --force
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension Continue.continue --force
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-yaml --force
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.java --force
        $CHE_CODE --extensions-dir $EXT_DIR --install-extension redhat.vscode-quarkus --force
        which jbang >/dev/null 2>&1 || curl -Ls https://sh.jbang.dev | bash -s - app setup
  - id: setup-continue
    exec:
      component: tools
      commandLine: "mkdir -p /home/user/.continue && cp /projects/${{ values.name }}/continue-config.json /home/user/.continue/config.json"
  - id: build
    exec:
      component: tools
      commandLine: "./mvnw package -DskipTests"
      workingDir: ${PROJECT_SOURCE}
  - id: run
    exec:
      component: tools
      commandLine: "./mvnw quarkus:dev"
      workingDir: ${PROJECT_SOURCE}
events:
  postStart:
    - install-extensions
    - setup-continue
