apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: k8s-ops-mcp-server
  title: "Kubernetes Operations MCP Server"
  description: "Creates an MCP server with Quarkus that provides AI-accessible tools for OpenShift/Kubernetes operations. Includes tools to list pods, deployments, routes, view pod logs, check resource health, and monitor namespace resource usage. Uses the OpenShift API with ServiceAccount-based authentication for secure cluster access."
  tags:
    - java
    - quarkus
    - mcp
    - kubernetes
    - openshift
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Application Information
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the MCP service
          default: k8s-ops-mcp
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          default: "MCP server for Kubernetes/OpenShift operations"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-neuralbank"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-neuralbank"
        targetNamespaces:
          title: Target Namespaces
          type: string
          description: "Comma-separated list of namespaces to monitor (e.g., kafka-cdc,kogito-bpm)"
          default: "kafka-cdc,kogito-bpm,openshift-lightspeed"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: ""
          ui:widget: hidden
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-neuralbank"
          targetNamespaces: ${{ parameters.targetNamespaces }}
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
          clusterDomain: ${{ parameters.clusterDomain }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Open in DevSpaces
        icon: chat
        url: "https://devspaces.${{ parameters.clusterDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}"
