apiVersion: registry.apicur.io/v1
kind: ApicurioRegistry
metadata:
  name: apicurio-registry
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  configuration:
    persistence: kafkasql
    kafkasql:
      bootstrapServers: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092
  deployment:
    replicas: 1
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apicurio-registry
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  host: apicurio-registry-kafka-cdc.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: apicurio-registry-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-cdc-schemas
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      containers:
      - name: schema-register
        image: registry.access.redhat.com/ubi9/ubi:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          REGISTRY_URL="http://apicurio-registry-service.kafka-cdc.svc:8080/apis/registry/v2"

          echo "Waiting for Apicurio Registry to be ready..."
          for i in $(seq 1 30); do
            if curl -sf "${REGISTRY_URL}/system/info" > /dev/null 2>&1; then
              echo "Registry is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done

          echo "=== Registering CDC schemas ==="

          curl -X POST "${REGISTRY_URL}/groups/cdc/artifacts" \
            -H "Content-Type: application/json; artifactType=JSON" \
            -H "X-Registry-ArtifactId: cdc.public.customers-value" \
            -d '{
              "type": "record",
              "name": "CustomerCDCEnvelope",
              "doc": "Debezium CDC envelope for public.customers table",
              "fields": [
                {"name": "before", "type": ["null", {"type": "record", "name": "Customer", "fields": [
                  {"name": "id", "type": "int"},
                  {"name": "first_name", "type": "string"},
                  {"name": "last_name", "type": "string"},
                  {"name": "email", "type": "string"},
                  {"name": "created_at", "type": ["null", "string"]}
                ]}]},
                {"name": "after", "type": ["null", "Customer"]},
                {"name": "op", "type": "string", "doc": "c=create, u=update, d=delete"},
                {"name": "ts_ms", "type": "long"},
                {"name": "source", "type": {"type": "record", "name": "Source", "fields": [
                  {"name": "db", "type": "string"},
                  {"name": "schema", "type": "string"},
                  {"name": "table", "type": "string"},
                  {"name": "lsn", "type": "long"}
                ]}}
              ]
            }' || true

          curl -X POST "${REGISTRY_URL}/groups/cdc/artifacts" \
            -H "Content-Type: application/json; artifactType=JSON" \
            -H "X-Registry-ArtifactId: cdc.public.orders-value" \
            -d '{
              "type": "record",
              "name": "OrderCDCEnvelope",
              "doc": "Debezium CDC envelope for public.orders table",
              "fields": [
                {"name": "before", "type": ["null", {"type": "record", "name": "Order", "fields": [
                  {"name": "id", "type": "int"},
                  {"name": "customer_id", "type": "int"},
                  {"name": "product", "type": "string"},
                  {"name": "amount", "type": "string"},
                  {"name": "status", "type": "string"},
                  {"name": "created_at", "type": ["null", "string"]}
                ]}]},
                {"name": "after", "type": ["null", "Order"]},
                {"name": "op", "type": "string"},
                {"name": "ts_ms", "type": "long"},
                {"name": "source", "type": "Source"}
              ]
            }' || true

          curl -X POST "${REGISTRY_URL}/groups/bpm/artifacts" \
            -H "Content-Type: application/json; artifactType=JSON" \
            -H "X-Registry-ArtifactId: bpm.approval.requests-value" \
            -d '{
              "type": "record",
              "name": "ApprovalRequest",
              "doc": "BPM approval request from SonataFlow customer onboarding",
              "fields": [
                {"name": "customer_id", "type": "int"},
                {"name": "name", "type": "string"},
                {"name": "email", "type": "string"},
                {"name": "tier", "type": "string", "doc": "premium|standard|basic"},
                {"name": "status", "type": "string", "doc": "pending_approval|approved|rejected"}
              ]
            }' || true

          curl -X POST "${REGISTRY_URL}/groups/bpm/artifacts" \
            -H "Content-Type: application/json; artifactType=JSON" \
            -H "X-Registry-ArtifactId: bpm.onboarding.metrics-value" \
            -d '{
              "type": "record",
              "name": "OnboardingMetric",
              "doc": "Onboarding completion metric from SonataFlow",
              "fields": [
                {"name": "event_type", "type": "string"},
                {"name": "customer_id", "type": "int"},
                {"name": "tier", "type": "string"},
                {"name": "timestamp", "type": ["null", "long"]}
              ]
            }' || true

          echo "=== Registering API Designs (OpenAPI) ==="

          curl -X POST "${REGISTRY_URL}/groups/api-designs/artifacts" \
            -H "Content-Type: application/json; artifactType=OPENAPI" \
            -H "X-Registry-ArtifactId: customer-service-api" \
            -d '{"openapi":"3.0.3","info":{"title":"Customer Service API","description":"REST API for managing customer data in the NeuralBank CDC pipeline. CRUD operations integrated with Debezium CDC for real-time event streaming.","version":"1.0.0","contact":{"name":"Event-Driven Architecture Team","email":"eda-team@neuralbank.io"}},"servers":[{"url":"https://customer-service-kafka-cdc.{{ .Values.clusterDomain }}","description":"OpenShift Route"}],"paths":{"/api/customers":{"get":{"summary":"List all customers","operationId":"listCustomers","parameters":[{"name":"limit","in":"query","schema":{"type":"integer","default":50}},{"name":"offset","in":"query","schema":{"type":"integer","default":0}}],"responses":{"200":{"description":"Customer list","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/Customer"}}}}}}},"post":{"summary":"Create a customer (triggers CDC event)","operationId":"createCustomer","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerCreate"}}}},"responses":{"201":{"description":"Customer created"}}}},"/api/customers/{id}":{"get":{"summary":"Get customer by ID","operationId":"getCustomer","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"integer"}}],"responses":{"200":{"description":"Customer detail","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Customer"}}}},"404":{"description":"Not found"}}},"put":{"summary":"Update customer (triggers CDC event)","operationId":"updateCustomer","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"integer"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerCreate"}}}},"responses":{"200":{"description":"Customer updated"}}}}},"components":{"schemas":{"Customer":{"type":"object","properties":{"id":{"type":"integer"},"first_name":{"type":"string"},"last_name":{"type":"string"},"email":{"type":"string","format":"email"},"created_at":{"type":"string","format":"date-time"}}},"CustomerCreate":{"type":"object","required":["first_name","last_name","email"],"properties":{"first_name":{"type":"string"},"last_name":{"type":"string"},"email":{"type":"string","format":"email"}}}}}}' || true

          curl -X POST "${REGISTRY_URL}/groups/api-designs/artifacts" \
            -H "Content-Type: application/json; artifactType=OPENAPI" \
            -H "X-Registry-ArtifactId: onboarding-workflow-api" \
            -d '{"openapi":"3.0.3","info":{"title":"Customer Onboarding Workflow API","description":"REST API exposed by the SonataFlow customer-onboarding workflow. Endpoints to trigger, query, and manage workflow instances for the BPM approval process.","version":"1.0.0","contact":{"name":"Event-Driven Architecture Team","email":"eda-team@neuralbank.io"}},"servers":[{"url":"https://customer-onboarding-kogito-bpm.{{ .Values.clusterDomain }}","description":"SonataFlow Route"}],"paths":{"/customer-onboarding":{"get":{"summary":"List all workflow instances","operationId":"listInstances","responses":{"200":{"description":"Active workflow instances","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/WorkflowInstance"}}}}}}},"post":{"summary":"Start a new onboarding workflow","operationId":"startWorkflow","requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CDCEvent"}}}},"responses":{"201":{"description":"Workflow started"}}}},"/customer-onboarding/{id}":{"get":{"summary":"Get workflow instance by ID","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string","format":"uuid"}}],"responses":{"200":{"description":"Workflow instance detail"}}},"delete":{"summary":"Abort workflow instance","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string","format":"uuid"}}],"responses":{"200":{"description":"Workflow aborted"}}}},"/q/health":{"get":{"summary":"Health check","responses":{"200":{"description":"Healthy"}}}},"/q/metrics":{"get":{"summary":"Prometheus metrics","responses":{"200":{"description":"Prometheus-formatted metrics"}}}}},"components":{"schemas":{"CDCEvent":{"type":"object","properties":{"before":{"type":"object","nullable":true},"after":{"type":"object","properties":{"id":{"type":"integer"},"first_name":{"type":"string"},"last_name":{"type":"string"},"email":{"type":"string"},"amount":{"type":"number"}}},"op":{"type":"string","enum":["c","u","d","r"]},"ts_ms":{"type":"integer"}}},"WorkflowInstance":{"type":"object","properties":{"id":{"type":"string","format":"uuid"},"workflowdata":{"type":"object"},"status":{"type":"string","enum":["ACTIVE","COMPLETED","ERROR","ABORTED"]}}}}}}' || true

          echo "=== Registering API Mocks (AsyncAPI) ==="

          curl -X POST "${REGISTRY_URL}/groups/api-mocks/artifacts" \
            -H "Content-Type: application/json; artifactType=ASYNCAPI" \
            -H "X-Registry-ArtifactId: cdc-events-asyncapi" \
            -d '{"asyncapi":"2.6.0","info":{"title":"CDC Events - Kafka Topics","description":"AsyncAPI spec for Debezium CDC events from PostgreSQL published to Kafka. Real-time data streaming mock for NeuralBank demo.","version":"1.0.0","contact":{"name":"Event-Driven Architecture Team"}},"servers":{"kafka-cluster":{"url":"cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092","protocol":"kafka","description":"AMQ Streams Kafka cluster"}},"channels":{"cdc.public.customers":{"description":"Customer CDC events from Debezium connector","subscribe":{"operationId":"receiveCustomerCDC","message":{"name":"CustomerCDCEvent","title":"Customer Change Data Capture Event","contentType":"application/json","payload":{"type":"object","properties":{"before":{"type":"object","nullable":true},"after":{"type":"object","properties":{"id":{"type":"integer"},"first_name":{"type":"string"},"last_name":{"type":"string"},"email":{"type":"string","format":"email"}}},"op":{"type":"string","enum":["c","u","d","r"]},"ts_ms":{"type":"integer"},"source":{"type":"object","properties":{"db":{"type":"string"},"schema":{"type":"string"},"table":{"type":"string"}}}}},"examples":[{"payload":{"before":null,"after":{"id":1001,"first_name":"Demo-a1b2c3","last_name":"User-1430","email":"demo-x9y8z7w6@neuralbank.io"},"op":"c","ts_ms":1713052800000,"source":{"db":"cdcdb","schema":"public","table":"customers"}}}]}}},"cdc.public.orders":{"description":"Order CDC events from Debezium connector","subscribe":{"operationId":"receiveOrderCDC","message":{"name":"OrderCDCEvent","contentType":"application/json","payload":{"type":"object","properties":{"before":{"type":"object","nullable":true},"after":{"type":"object","properties":{"id":{"type":"integer"},"customer_id":{"type":"integer"},"product":{"type":"string"},"amount":{"type":"number"},"status":{"type":"string"}}},"op":{"type":"string","enum":["c","u","d","r"]},"ts_ms":{"type":"integer"}}}}}}}}' || true

          curl -X POST "${REGISTRY_URL}/groups/api-mocks/artifacts" \
            -H "Content-Type: application/json; artifactType=ASYNCAPI" \
            -H "X-Registry-ArtifactId: bpm-workflow-events-asyncapi" \
            -d '{"asyncapi":"2.6.0","info":{"title":"BPM Workflow Events - Kafka Topics","description":"AsyncAPI spec for SonataFlow BPM workflow events. Approval requests and onboarding metrics published after workflow execution.","version":"1.0.0","contact":{"name":"Event-Driven Architecture Team"}},"servers":{"kafka-cluster":{"url":"cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092","protocol":"kafka","description":"AMQ Streams Kafka cluster"}},"channels":{"bpm.approval.requests":{"description":"Approval requests from customer-onboarding SonataFlow workflow","subscribe":{"operationId":"receiveApprovalRequest","message":{"name":"ApprovalRequestEvent","contentType":"application/json","payload":{"type":"object","properties":{"customer_id":{"type":"integer"},"name":{"type":"string"},"email":{"type":"string","format":"email"},"tier":{"type":"string","enum":["basic","standard","premium"]},"status":{"type":"string","enum":["pending_approval","approved","rejected"]}}},"examples":[{"payload":{"customer_id":1001,"name":"Demo-a1b2c3 User-1430","email":"demo-x9y8z7w6@neuralbank.io","tier":"premium","status":"pending_approval"}}]}}},"bpm.onboarding.metrics":{"description":"Onboarding completion metrics","subscribe":{"operationId":"receiveOnboardingMetric","message":{"name":"OnboardingMetricEvent","contentType":"application/json","payload":{"type":"object","properties":{"event_type":{"type":"string","enum":["onboarding_started","onboarding_completed","onboarding_failed"]},"customer_id":{"type":"integer"},"tier":{"type":"string","enum":["basic","standard","premium"]},"processing_time_ms":{"type":"integer"},"timestamp":{"type":"integer"}}}}}}}}' || true

          echo "=== All 8 artifacts registered ==="
      restartPolicy: OnFailure
