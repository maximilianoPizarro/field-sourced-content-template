apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: ${{values.name}}-apikey
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.name}}-route
  defaults:
    rules:
      authentication:
        api-key-auth:
          apiKey:
            allNamespaces: true
            selector:
              matchLabels:
                app: ${{values.name}}
                kuadrant.io/apikey: "true"
          credentials:
            customHeader:
              name: X-API-Key
          metrics: false
          priority: 0
      response:
        success: {}
        unauthenticated:
          code: 401
          body:
            value: '{"error":"Invalid or missing API key. Include header X-API-Key with a valid key."}'
          headers:
            content-type:
              value: "application/json"
