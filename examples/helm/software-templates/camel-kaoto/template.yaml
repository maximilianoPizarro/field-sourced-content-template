apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: camel-kaoto-cdc-route
  title: "Camel CDC Route (Kaoto)"
  description: "Create a Camel route for CDC event processing with Kaoto visual designer in DevSpaces"
  tags:
    - camel
    - kaoto
    - cdc
    - kafka
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Project Configuration
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the Camel route project
          ui:autofocus: true
          default: "my-camel-cdc-route"
          pattern: "^[a-z0-9-]+$"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-neuralbank"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-neuralbank"
        description:
          title: Description
          type: string
          description: Description of the Camel route
          default: "CDC event processing route using Apache Camel with Kaoto visual designer"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: "apps.cluster-l9nhj.dynamic.redhatworkshops.io"
          ui:widget: hidden
    - title: Kafka Configuration
      properties:
        kafkaBootstrap:
          title: Kafka Bootstrap Server
          type: string
          default: "cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9092"
        kafkaTopic:
          title: Source Kafka Topic
          type: string
          default: "cdc.public.customers"
  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          kafkaBootstrap: ${{ parameters.kafkaBootstrap }}
          kafkaTopic: ${{ parameters.kafkaTopic }}
          namespace: "${{ parameters.owner }}-neuralbank"
          clusterDomain: ${{ parameters.clusterDomain }}

    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in DevSpaces
        icon: chat
        url: "https://devspaces.${{ parameters.clusterDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}"
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
