apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  name: mesh-traffic-generator
  namespace: openshift-cluster-observability-operator
data:
  generate.sh: |
    #!/bin/sh
    echo "=== Mesh Traffic Generator ==="
    echo "Interval: ${INTERVAL:-5}s"

    while true; do
      # MCP gateway (L7 waypoint metrics)
      curl -sk -o /dev/null -w "%{http_code} mcp-gw/\n" --connect-timeout 2 --max-time 4 \
        "http://mcp-gateway-istio.mcp-system.svc:8080/" &
      wait
      sleep $(( ${INTERVAL:-5} + RANDOM % 3 ))
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app: mesh-traffic-generator
    app.kubernetes.io/part-of: observability
  name: mesh-traffic-generator
  namespace: openshift-cluster-observability-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh-traffic-generator
  template:
    metadata:
      labels:
        app: mesh-traffic-generator
    spec:
      containers:
      - name: traffic-gen
        image: registry.access.redhat.com/ubi9/ubi:latest
        command: ["/bin/sh", "/scripts/generate.sh"]
        env:
        - name: INTERVAL
          value: "5"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: mesh-traffic-generator
          defaultMode: 0755
      terminationGracePeriodSeconds: 5
---
