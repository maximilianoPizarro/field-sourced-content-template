- route:
    id: mqtt-temperature-to-kafka
    description: "Bridges MQTT temperature sensor readings to Kafka topic"
    from:
      uri: paho:iot-sensor/sw/temperature
      parameters:
        brokerUrl: ${{ values.mqttBrokerUri }}
        clientId: camel-kaoto-temp
      steps:
        - log:
            message: "Temperature reading from MQTT: ${body}"
        - setHeader:
            name: kafka.KEY
            constant: "${{ values.name }}"
        - to:
            uri: kafka:iot-sensor-sw-temperature
            parameters:
              brokers: ${{ values.kafkaBrokerUri }}
        - log:
            message: "Temperature forwarded to Kafka"
