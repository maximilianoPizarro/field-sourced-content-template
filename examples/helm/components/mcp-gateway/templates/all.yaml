apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-mcp-server-script
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  server.py: |
    import os, json, logging
    from mcp.server.fastmcp import FastMCP

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger("argocd-mcp")

    ARGOCD_URL = os.environ.get("ARGOCD_SERVER_URL", "https://openshift-gitops-server.openshift-gitops.svc")
    ARGOCD_USER = os.environ.get("ARGOCD_USERNAME", "admin")
    ARGOCD_PASS = os.environ.get("ARGOCD_PASSWORD", "")

    _token_cache = {"token": None, "expires": 0}

    def _get_token():
        import time
        if _token_cache["token"] and time.time() < _token_cache["expires"]:
            return _token_cache["token"]
        import urllib.request, ssl
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        body = json.dumps({"username": ARGOCD_USER, "password": ARGOCD_PASS}).encode()
        req = urllib.request.Request(f"{ARGOCD_URL}/api/v1/session", data=body,
            headers={"Content-Type": "application/json"}, method="POST")
        resp = urllib.request.urlopen(req, context=ctx, timeout=10)
        data = json.loads(resp.read())
        _token_cache["token"] = data["token"]
        _token_cache["expires"] = time.time() + 3500
        return _token_cache["token"]

    def _api(path, method="GET", body=None):
        import urllib.request, ssl
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        headers = {"Authorization": f"Bearer {_get_token()}", "Content-Type": "application/json"}
        data = json.dumps(body).encode() if body else None
        req = urllib.request.Request(f"{ARGOCD_URL}{path}", data=data, headers=headers, method=method)
        resp = urllib.request.urlopen(req, context=ctx, timeout=30)
        return json.loads(resp.read())

    mcp = FastMCP("argocd-mcp-server", host="0.0.0.0", port=8080)

    @mcp.tool()
    def list_applications() -> str:
        """List all ArgoCD applications with their sync status, health, and target revision."""
        data = _api("/api/v1/applications")
        apps = []
        for app in data.get("items", []):
            meta = app.get("metadata", {})
            status = app.get("status", {})
            sync = status.get("sync", {})
            health = status.get("health", {})
            spec = app.get("spec", {})
            source = spec.get("source", {})
            apps.append({
                "name": meta.get("name"),
                "namespace": spec.get("destination", {}).get("namespace"),
                "sync_status": sync.get("status"),
                "health": health.get("status"),
                "repo": source.get("repoURL", ""),
                "revision": sync.get("revision", "")[:8],
                "target_revision": source.get("targetRevision", ""),
            })
        apps.sort(key=lambda a: a["name"])
        return json.dumps(apps, indent=2)

    @mcp.tool()
    def get_application_detail(app_name: str) -> str:
        """Get detailed status of a specific ArgoCD application including sync status, health, conditions, and recent operations.

        Args:
            app_name: Name of the ArgoCD application.
        """
        app = _api(f"/api/v1/applications/{app_name}")
        status = app.get("status", {})
        sync = status.get("sync", {})
        health = status.get("health", {})
        op_state = status.get("operationState", {})
        conditions = status.get("conditions", [])
        spec = app.get("spec", {})
        source = spec.get("source", {})
        result = {
            "name": app_name,
            "project": spec.get("project"),
            "repo": source.get("repoURL"),
            "path": source.get("path"),
            "target_revision": source.get("targetRevision"),
            "sync_status": sync.get("status"),
            "sync_revision": sync.get("revision", "")[:12],
            "health": health.get("status"),
            "health_message": health.get("message"),
            "auto_sync": bool(spec.get("syncPolicy", {}).get("automated")),
            "last_operation": {
                "phase": op_state.get("phase"),
                "message": op_state.get("message", "")[:500],
                "started_at": op_state.get("startedAt"),
                "finished_at": op_state.get("finishedAt"),
            } if op_state else None,
            "conditions": [{"type": c.get("type"), "message": c.get("message", "")[:200]} for c in conditions],
        }
        resources = status.get("resources", [])
        degraded = [r for r in resources if r.get("health", {}).get("status") in ("Degraded", "Missing")]
        out_of_sync = [r for r in resources if r.get("status") == "OutOfSync"]
        if degraded:
            result["degraded_resources"] = [
                {"kind": r["kind"], "name": r["name"], "namespace": r.get("namespace", ""),
                 "health": r.get("health", {}).get("status"), "message": r.get("health", {}).get("message", "")[:200]}
                for r in degraded[:10]
            ]
        if out_of_sync:
            result["out_of_sync_resources"] = [
                {"kind": r["kind"], "name": r["name"], "namespace": r.get("namespace", "")}
                for r in out_of_sync[:10]
            ]
        return json.dumps(result, indent=2)

    @mcp.tool()
    def sync_application(app_name: str, prune: bool = False) -> str:
        """Trigger a sync operation on an ArgoCD application. This will reconcile the live state with the desired state in Git.

        Args:
            app_name: Name of the ArgoCD application to sync.
            prune: If true, resources that are no longer in Git will be deleted (default: false).
        """
        body = {"prune": prune}
        try:
            result = _api(f"/api/v1/applications/{app_name}/sync", method="POST", body=body)
            phase = result.get("status", {}).get("operationState", {}).get("phase", "Initiated")
            return json.dumps({
                "action": "sync_triggered",
                "application": app_name,
                "prune": prune,
                "phase": phase,
                "message": f"Sync initiated for {app_name}. Use get_application_detail to monitor progress.",
            }, indent=2)
        except Exception as e:
            return json.dumps({"error": str(e), "application": app_name})

    @mcp.tool()
    def hard_refresh_application(app_name: str) -> str:
        """Force ArgoCD to re-read the Git repository and invalidate the manifest cache for an application.

        Args:
            app_name: Name of the ArgoCD application to refresh.
        """
        try:
            result = _api(f"/api/v1/applications/{app_name}?refresh=hard", method="GET")
            sync = result.get("status", {}).get("sync", {})
            return json.dumps({
                "action": "hard_refresh",
                "application": app_name,
                "sync_status": sync.get("status"),
                "revision": sync.get("revision", "")[:12],
                "message": f"Cache invalidated and Git re-read for {app_name}.",
            }, indent=2)
        except Exception as e:
            return json.dumps({"error": str(e), "application": app_name})

    @mcp.tool()
    def get_resource_diff(app_name: str) -> str:
        """Get the diff between the desired (Git) and live (cluster) state for out-of-sync resources.

        Args:
            app_name: Name of the ArgoCD application.
        """
        try:
            app = _api(f"/api/v1/applications/{app_name}")
            resources = app.get("status", {}).get("resources", [])
            oos = [r for r in resources if r.get("status") == "OutOfSync"]
            if not oos:
                return json.dumps({"application": app_name, "message": "All resources are in sync.", "out_of_sync_count": 0})
            summary = []
            for r in oos[:15]:
                summary.append({
                    "kind": r["kind"], "name": r["name"], "namespace": r.get("namespace", ""),
                    "requires_pruning": r.get("requiresPruning", False),
                })
            return json.dumps({"application": app_name, "out_of_sync_count": len(oos), "resources": summary}, indent=2)
        except Exception as e:
            return json.dumps({"error": str(e)})

    @mcp.tool()
    def rollback_application(app_name: str, revision_id: int = 0) -> str:
        """Rollback an ArgoCD application to a previous sync revision.

        Args:
            app_name: Name of the ArgoCD application to rollback.
            revision_id: The history ID to rollback to. Use 0 for the previous revision.
        """
        try:
            app = _api(f"/api/v1/applications/{app_name}")
            history = app.get("status", {}).get("history", [])
            if not history:
                return json.dumps({"error": "No sync history available", "application": app_name})
            if revision_id == 0:
                target = history[-2] if len(history) >= 2 else history[-1]
                revision_id = target.get("id", 0)
            result = _api(f"/api/v1/applications/{app_name}/rollback", method="POST", body={"id": revision_id})
            return json.dumps({
                "action": "rollback",
                "application": app_name,
                "target_revision_id": revision_id,
                "message": f"Rollback initiated to revision {revision_id}.",
            }, indent=2)
        except Exception as e:
            return json.dumps({"error": str(e), "application": app_name})

    @mcp.tool()
    def diagnose_application(app_name: str) -> str:
        """Diagnose issues with an ArgoCD application. Checks sync errors, degraded resources, conditions, and suggests remediation actions.

        Args:
            app_name: Name of the ArgoCD application to diagnose.
        """
        try:
            app = _api(f"/api/v1/applications/{app_name}")
            status = app.get("status", {})
            sync = status.get("sync", {})
            health = status.get("health", {})
            op_state = status.get("operationState", {})
            conditions = status.get("conditions", [])
            resources = status.get("resources", [])

            issues = []
            recommendations = []

            if sync.get("status") == "OutOfSync":
                oos = [r for r in resources if r.get("status") == "OutOfSync"]
                issues.append(f"Application is OutOfSync with {len(oos)} resource(s) diverged from Git.")
                recommendations.append("Run sync_application to reconcile, or hard_refresh_application if Git was recently updated.")

            if health.get("status") in ("Degraded", "Missing"):
                degraded = [r for r in resources if r.get("health", {}).get("status") in ("Degraded", "Missing")]
                for r in degraded[:5]:
                    msg = r.get("health", {}).get("message", "no details")
                    issues.append(f"{r['kind']}/{r['name']} is {r['health']['status']}: {msg[:200]}")
                recommendations.append("Check pod logs and events for degraded resources. Fix the root cause then sync.")

            if op_state.get("phase") == "Failed":
                issues.append(f"Last sync operation FAILED: {op_state.get('message', '')[:300]}")
                recommendations.append("Review the error message. Common fixes: fix YAML errors, resolve immutable field changes, ensure secrets exist.")

            for c in conditions:
                issues.append(f"Condition [{c.get('type')}]: {c.get('message', '')[:200]}")

            if not issues:
                issues.append("No issues detected. Application is healthy and in sync.")
                recommendations.append("No action needed.")

            return json.dumps({
                "application": app_name,
                "sync_status": sync.get("status"),
                "health": health.get("status"),
                "issues": issues,
                "recommendations": recommendations,
            }, indent=2)
        except Exception as e:
            return json.dumps({"error": str(e)})

    if __name__ == "__main__":
        mcp.run(transport="streamable-http")
