apiVersion: monitoring.rhobs/v1
kind: PrometheusRule
metadata:
  name: kafka-cdc-alerts
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    openshift.io/user-monitoring: "true"
spec:
  groups:
    - name: kafka-cdc
      rules:
        - alert: KafkaConsumerLagHigh
          expr: kafka_consumergroup_lag > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Consumer lag alto en {{`{{ $labels.consumergroup }}`}}"
            description: "El consumer group {{`{{ $labels.consumergroup }}`}} tiene lag > 1000 en el topic {{`{{ $labels.topic }}`}} particion {{`{{ $labels.partition }}`}}"
        - alert: DebeziumDisconnected
          expr: debezium_postgres_Connected == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Debezium desconectado de PostgreSQL"
            description: "El connector Debezium perdio la conexion con la base de datos PostgreSQL"
        - alert: KafkaConnectTaskFailed
          expr: kafka_connect_worker_connector_failed_task_count > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "KafkaConnect connector en estado FAILED"
            description: "Hay {{`{{ $value }}`}} tasks en estado FAILED en KafkaConnect"
---
