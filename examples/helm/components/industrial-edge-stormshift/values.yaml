clusterDomain: apps.cluster.example.com

global:
  localClusterDomain: apps.cluster.example.com
  hubClusterDomain: apps.cluster.example.com

  imageregistry:
    type: openshift-internal

s3:
  default_region: us-east-1

messaging:
  vibrationAlert: true
  vibrationAnomaly: false
  nodeTlsReject: 0

machineSensor1:
  port: 80

machineSensor2:
  port: 80
  sensorTemperature: false

mqtt:
  broker:
    uri: "tcp://broker-amq-mqtt-all-0-svc:61616"
    clientId: "MQTT2KafkaRoute"
    topic:
      temperature: "iot-sensor/sw/temperature"
      vibration: "iot-sensor/sw/vibration"

kafka:
  broker:
    uri: "factory-cluster-kafka-bootstrap:9092"
    topic:
      temperature: "industrial-edge-stormshift-messaging.iot-sensor-sw-temperature"
      vibration: "industrial-edge-stormshift-messaging.iot-sensor-sw-vibration"

machine_sensor:
  bootstrap_image: quay.io/hybridcloudpatterns/iot-software-sensor:0.4.0
  bootstrap_tag: 0.4.0
  image_location: quay.io/hybridcloudpatterns/iot-software-sensor
  repo_name: iot-software-sensor
  tag: 0.4.0
  built_tags: []

iot_consumer:
  bootstrap_image: quay.io/hybridcloudpatterns/iot-consumer:0.4.0
  bootstrap_tag: 0.4.0
  image_location: quay.io/hybridcloudpatterns/iot-consumer
  repo_name: iot-consumer
  tag: 0.4.0
  built_tags: []

iot_frontend:
  bootstrap_image: quay.io/hybridcloudpatterns/iot-frontend:0.4.0
  bootstrap_tag: 0.4.0
  image_location: quay.io/hybridcloudpatterns/iot-frontend
  repo_name: iot-frontend
  tag: 0.4.0
  built_tags: []
