site:
  title: "Event-Driven Architecture Live"
  start_page: event-driven-demo::index.adoc
content:
  sources:
    - url: https://github.com/maximilianoPizarro/field-sourced-content-template.git
      branches: main
      start_path: showroom/content
asciidoc:
  attributes:
    cluster_domain: "apps.cluster-l9nhj.dynamic.redhatworkshops.io"
    user: "%user%"
ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files:
    - path: partials/header.hbs
      contents: ""
    - path: partials/toolbar.hbs
      contents: ""
    - path: partials/footer-content.hbs
      contents: ""
    - path: css/extra.css
      contents: |
        :root {
          --color-brand-red: #CC0000;
          --color-brand-dark: #151515;
          --color-brand-blue: #0066CC;
        }
        .navbar { display: none !important; }
        .nav-panel-explore { display: none !important; }
        .nav-panel-menu .nav-link.is-current-page {
          border-left: 3px solid var(--color-brand-red);
          font-weight: 700;
        }
        .doc a { color: var(--color-brand-blue); }
        .doc th { background: var(--color-brand-dark); color: #fff; }
        pre.highlight code { font-size: 0.85rem; }
        .three-container {
          width: 100%;
          height: 400px;
          border: 1px solid #333;
          border-radius: 8px;
          margin: 1.5rem 0;
          background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
          position: relative;
        }
        .fullscreen-btn {
          position: absolute;
          top: 8px;
          right: 8px;
          z-index: 100;
          background: rgba(0,0,0,0.7);
          color: #fff;
          border: 1px solid #555;
          border-radius: 4px;
          padding: 4px 10px;
          cursor: pointer;
          font-size: 13px;
          transition: background 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(80,80,80,0.9); }
        .doc .imageblock img {
          cursor: pointer;
          transition: transform 0.2s;
        }
        .doc .imageblock img:hover { transform: scale(1.02); }
        .img-overlay {
          position: fixed;
          top: 0; left: 0; width: 100vw; height: 100vh;
          background: rgba(0,0,0,0.92);
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: zoom-out;
        }
        .img-overlay img {
          max-width: 95vw;
          max-height: 95vh;
          border-radius: 8px;
          box-shadow: 0 0 40px rgba(0,102,204,0.3);
        }
        [id^="scene-"]:fullscreen,
        .three-container:fullscreen {
          background: #0a0a1a;
          width: 100vw !important;
          height: 100vh !important;
        }
        @media (max-width: 768px) {
          .nav-container { display: none; }
          .doc { padding: 0.5rem; }
          .doc table { display: block; overflow-x: auto; }
          .doc pre { font-size: 0.75rem; overflow-x: auto; }
          .three-container, [id^="scene-"] { height: 280px !important; }
        }
    - path: js/three-helper.js
      contents: |
        window.ThreeHelper = {
          initScene: function(containerId, options) {
            var opts = options || {};
            var container = document.getElementById(containerId);
            if (!container) return null;
            var w = container.clientWidth || 800;
            var h = opts.height || 400;
            container.style.height = h + 'px';
            container.style.position = 'relative';
            container.style.borderRadius = '12px';
            container.style.overflow = 'hidden';
            container.style.marginBottom = '1.5rem';

            var scene = new THREE.Scene();
            scene.background = new THREE.Color(opts.bgColor || 0x0a0a1a);
            scene.fog = new THREE.FogExp2(opts.bgColor || 0x0a0a1a, 0.015);

            var camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            camera.position.set(opts.camX || 0, opts.camY || 8, opts.camZ || 20);

            var renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            var controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = opts.autoRotate !== false;
            controls.autoRotateSpeed = opts.rotateSpeed || 0.5;

            scene.add(new THREE.AmbientLight(0x404060, 0.6));
            var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            var pointLight = new THREE.PointLight(0x4488ff, 0.5, 50);
            pointLight.position.set(-5, 10, 5);
            scene.add(pointLight);

            var gridHelper = new THREE.GridHelper(40, 40, 0x1a1a3a, 0x1a1a3a);
            gridHelper.position.y = -2;
            scene.add(gridHelper);

            // Fullscreen button
            var fsBtn = document.createElement('button');
            fsBtn.className = 'fullscreen-btn';
            fsBtn.textContent = '⛶ Fullscreen';
            fsBtn.onclick = function() {
              if (container.requestFullscreen) container.requestFullscreen();
              else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            };
            container.appendChild(fsBtn);

            window.addEventListener('resize', function() {
              var nw = container.clientWidth;
              var nh = document.fullscreenElement === container ? window.innerHeight : h;
              camera.aspect = nw / nh;
              camera.updateProjectionMatrix();
              renderer.setSize(nw, nh);
            });

            return { scene: scene, camera: camera, renderer: renderer, controls: controls };
          },

          createNode: function(scene, label, color, x, y, z, options) {
            var opts = options || {};
            var sx = opts.width || 2.5; var sy = opts.height || 1.2; var sz = opts.depth || 1.2;
            var geo = new THREE.BoxGeometry(sx, sy, sz);
            var mat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.85, shininess: 80 });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            var edges = new THREE.EdgesGeometry(geo);
            var lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            var wireframe = new THREE.LineSegments(edges, lineMat);
            wireframe.position.copy(mesh.position);
            scene.add(wireframe);

            if (label) {
              var canvas = document.createElement('canvas');
              canvas.width = 256; canvas.height = 64;
              var ctx = canvas.getContext('2d');
              ctx.fillStyle = 'transparent'; ctx.fillRect(0, 0, 256, 64);
              ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
              ctx.fillText(label, 128, 40);
              var texture = new THREE.CanvasTexture(canvas);
              var spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
              var sprite = new THREE.Sprite(spriteMat);
              sprite.position.set(x, y + sy / 2 + 0.8, z);
              sprite.scale.set(3, 0.75, 1);
              scene.add(sprite);
            }
            return mesh;
          },

          createEdge: function(scene, from, to, color, options) {
            var opts = options || {};
            var points = [];
            var start = from.position.clone();
            var end = to.position.clone();
            points.push(start); points.push(end);
            var geo = new THREE.BufferGeometry().setFromPoints(points);
            var mat = new THREE.LineBasicMaterial({ color: color || 0x4488ff, transparent: true, opacity: 0.4 });
            var line = new THREE.Line(geo, mat);
            scene.add(line);

            var particleCount = opts.particleCount || 8;
            var pGeo = new THREE.BufferGeometry();
            var positions = new Float32Array(particleCount * 3);
            for (var i = 0; i < particleCount; i++) {
              var t = i / particleCount;
              positions[i * 3] = start.x + (end.x - start.x) * t;
              positions[i * 3 + 1] = start.y + (end.y - start.y) * t;
              positions[i * 3 + 2] = start.z + (end.z - start.z) * t;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            var pMat = new THREE.PointsMaterial({ color: color || 0x44aaff, size: opts.particleSize || 0.15, transparent: true, opacity: 0.8 });
            var particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            return { line: line, particles: particles, start: start, end: end, speed: opts.speed || 0.005 };
          },

          animateEdges: function(edges, time) {
            edges.forEach(function(edge) {
              var positions = edge.particles.geometry.attributes.position.array;
              var count = positions.length / 3;
              for (var i = 0; i < count; i++) {
                var t = ((i / count) + time * edge.speed) % 1;
                positions[i * 3] = edge.start.x + (edge.end.x - edge.start.x) * t;
                positions[i * 3 + 1] = edge.start.y + (edge.end.y - edge.start.y) * t;
                positions[i * 3 + 2] = edge.start.z + (edge.end.z - edge.start.z) * t;
              }
              edge.particles.geometry.attributes.position.needsUpdate = true;
            });
          },

          animate: function(ctx, edges, customFn) {
            var clock = new THREE.Clock();
            function loop() {
              requestAnimationFrame(loop);
              var elapsed = clock.getElapsedTime();
              ctx.controls.update();
              if (edges) ThreeHelper.animateEdges(edges, elapsed);
              if (customFn) customFn(elapsed);
              ctx.renderer.render(ctx.scene, ctx.camera);
            }
            loop();
          }
        };

        // Image fullscreen on click
        document.addEventListener('DOMContentLoaded', function() {
          document.querySelectorAll('.doc .imageblock img').forEach(function(img) {
            img.addEventListener('click', function() {
              var overlay = document.createElement('div');
              overlay.className = 'img-overlay';
              var clone = img.cloneNode();
              overlay.appendChild(clone);
              overlay.addEventListener('click', function() { overlay.remove(); });
              document.body.appendChild(overlay);
            });
          });
          // Ensure all 3D containers have a fullscreen button
          var selectors = document.querySelectorAll('.three-container, [id^="scene-"]');
          selectors.forEach(function(el) {
            if (el.querySelector('.fullscreen-btn')) return;
            el.style.position = el.style.position || 'relative';
            var btn = document.createElement('button');
            btn.className = 'fullscreen-btn';
            btn.textContent = '\u26F6 Fullscreen';
            btn.onclick = function() {
              if (el.requestFullscreen) el.requestFullscreen();
              else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            };
            el.appendChild(btn);
          });
        });
