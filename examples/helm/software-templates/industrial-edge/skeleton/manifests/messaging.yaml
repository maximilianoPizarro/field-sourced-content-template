apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-configmap
  namespace: ${{values.namespace}}
data:
  VIBRATION_ALERT_ENABLED: "true"
  VIBRATION_ANOMALY_ENABLED: "{% if values.anomalyDetection %}true{% else %}false{% endif %}"
  NODE_TLS_REJECT_UNAUTHORIZED: "0"
  MQTT_BROKER: "ws://broker-amq-mqtt-all-0-svc:61616"
  MQTT_USER: "iotuser"
  PORT: "3000"
  SOCKET_PATH: "/api/service-web/socket"
  TEMPERATURE_THRESHOLD: "70.0"
  TEMPERATURE_ALERT_ENABLED: "true"
  TOPIC_GPS: "iot-sensor/sw/gps"
  TOPIC_TEMPERATURE: "iot-sensor/sw/temperature"
  TOPIC_VIBRATION: "iot-sensor/sw/vibration"
  TOPIC_LIGHT: "iot-sensor/sw/light"
  ANOMALY_DETECTION_URL: "http://modelmesh-serving.${{values.namespace}}:8008"
  ANOMALY_DETECTION_URL_PATH: "/v2/models/inference-service/infer"
---
apiVersion: v1
kind: Secret
metadata:
  name: messaging-secret
  namespace: ${{values.namespace}}
type: Opaque
stringData:
  MQTT_PASSWORD: "iotuser"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging
  namespace: ${{values.namespace}}
  labels:
    app: messaging
    app.kubernetes.io/part-of: ${{values.uniqueName}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging
  template:
    metadata:
      labels:
        app: messaging
    spec:
      containers:
        - name: messaging
          image: quay.io/hybridcloudpatterns/iot-consumer:0.4.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: messaging-configmap
            - secretRef:
                name: messaging-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: messaging
  namespace: ${{values.namespace}}
spec:
  selector:
    app: messaging
  ports:
    - name: 3000-tcp
      port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: messaging
  namespace: ${{values.namespace}}
  annotations:
    haproxy.router.openshift.io/timeout: "300s"
spec:
  to:
    kind: Service
    name: messaging
  port:
    targetPort: 3000-tcp
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
