apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt2kafka-config
  namespace: ${{values.namespace}}
data:
  application.properties: |
    kafka.broker.uri=${{values.uniqueName}}-cluster-kafka-bootstrap.${{values.namespace}}.svc:9092
    kafka.broker.topic.temperature=iot-sensor-sw-temperature
    kafka.broker.topic.vibration=iot-sensor-sw-vibration
    mqtt.broker.uri=tcp://broker-amq-mqtt-all-0-svc.${{values.namespace}}.svc:61616
    mqtt.broker.clientId=MQTT2KafkaRoute-${{values.uniqueName}}
    mqtt.broker.topic.temperature=iot-sensor/sw/temperature
    mqtt.broker.topic.vibration=iot-sensor/sw/vibration
---
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: mqtt2kafka-integration
  namespace: ${{values.namespace}}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  traits:
    mount:
      configs:
        - configmap:mqtt2kafka-config
  profile: OpenShift
  sources:
    - content: |
        import org.apache.camel.PropertyInject;
        import org.apache.camel.builder.RouteBuilder;
        import org.apache.camel.component.kafka.KafkaConstants;
        import org.apache.camel.model.OnCompletionDefinition;

        public class MQTT2KafkaRoute extends RouteBuilder {
            @PropertyInject("kafka.broker.uri")            private String kafka_broker_uri;
            @PropertyInject("kafka.broker.topic.temperature") private String kafka_topic_temp;
            @PropertyInject("kafka.broker.topic.vibration")   private String kafka_topic_vibr;
            @PropertyInject("mqtt.broker.uri")              private String mqtt_broker_uri;
            @PropertyInject("mqtt.broker.clientId")         private String mqtt_clientid;
            @PropertyInject("mqtt.broker.topic.temperature")  private String mqtt_topic_temp;
            @PropertyInject("mqtt.broker.topic.vibration")    private String mqtt_topic_vibr;

            @Override
            public void configure() throws Exception {
                from("paho:" + mqtt_topic_temp + "?brokerUrl=" + mqtt_broker_uri
                        + "&clientId=" + mqtt_clientid + "-temp")
                    .log("Temperature MQTT → Kafka: ${body}")
                    .setHeader(KafkaConstants.KEY, constant("${{values.uniqueName}}"))
                    .to("kafka:" + kafka_topic_temp + "?brokers=" + kafka_broker_uri);

                from("paho:" + mqtt_topic_vibr + "?brokerUrl=" + mqtt_broker_uri
                        + "&clientId=" + mqtt_clientid + "-vibr")
                    .log("Vibration MQTT → Kafka: ${body}")
                    .setHeader(KafkaConstants.KEY, constant("${{values.uniqueName}}"))
                    .to("kafka:" + kafka_topic_vibr + "?brokers=" + kafka_broker_uri);
            }

            @Override
            public OnCompletionDefinition onCompletion() { return super.onCompletion(); }
        }
      name: MQTT2KafkaRoute.java
