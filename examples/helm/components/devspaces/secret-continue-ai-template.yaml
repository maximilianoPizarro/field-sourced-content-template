# =============================================================================
# Continue AI - LLM Secret Template (NOT managed by GitOps)
# =============================================================================
# This file is a REFERENCE TEMPLATE for manually creating the secret
# that provides LLM credentials to all DevSpaces workspaces.
#
# The secret uses DevWorkspace auto-mount labels to inject environment
# variables into every workspace automatically.
#
# USAGE:
#   1. Copy this file and replace placeholder values with real credentials
#   2. Apply with: oc apply -f secret-continue-ai.yaml
#   3. Restart any running workspaces to pick up the new secret
#
# DO NOT commit this file with real credentials to Git.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: continue-ai-config
  namespace: devspaces
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-secret: "true"
  annotations:
    controller.devfile.io/mount-as: env
type: Opaque
stringData:
  CONTINUE_API_KEY: "<REPLACE_WITH_API_KEY>"
  CONTINUE_API_BASE: "<REPLACE_WITH_LITELLM_URL>/v1"
  CONTINUE_MODEL: "<REPLACE_WITH_MODEL_NAME>"
