apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: messaging
  namespace: industrial-edge-stormshift-messaging
spec:
  subdomain: messaging-industrial-edge-stormshift-messaging
  port:
    targetPort: 3000-tcp
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: messaging
    weight: 100
  wildcardPolicy: None
