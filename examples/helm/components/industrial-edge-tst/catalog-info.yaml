---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ie-mqtt-events
  namespace: default
  description: "MQTT IoT sensor events — vibration and temperature data published from machine sensors"
  tags:
    - mqtt
    - iot
    - events
spec:
  type: asyncapi
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge-system
  definition: |
    asyncapi: 2.6.0
    info:
      title: Industrial Edge IoT Sensor Events
      version: 1.0.0
      description: MQTT events from machine sensors (vibration, temperature)
    channels:
      iot-sensor/sw/vibration:
        publish:
          summary: Vibration sensor readings
          message:
            payload:
              type: string
              description: "CSV: line,pump,value,timestamp"
      iot-sensor/sw/temperature:
        publish:
          summary: Temperature sensor readings
          message:
            payload:
              type: string
              description: "CSV: line,sensor,value,timestamp"
    servers:
      dev-broker:
        url: broker-amq-mqtt-all-0-svc.industrial-edge-tst-all.svc:61616
        protocol: mqtt
      factory-broker:
        url: broker-amq-mqtt-all-0-svc.industrial-edge-stormshift-messaging.svc:61616
        protocol: mqtt
