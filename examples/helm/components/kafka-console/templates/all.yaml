apiVersion: v1
kind: Secret
metadata:
  name: kafka-console-oidc
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "4"
type: Opaque
stringData:
  client-secret: kafka-console-oidc-secret
---
apiVersion: console.streamshub.github.com/v1alpha1
kind: Console
metadata:
  name: kafka-console
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostname: kafka-console-kafka-cdc.{{ .Values.clusterDomain }}
  security:
    oidc:
      authServerUrl: https://rhbk.{{ .Values.clusterDomain }}/realms/backstage
      clientId: kafka-console
      clientSecret:
        valueFrom:
          secretKeyRef:
            name: kafka-console-oidc
            key: client-secret
    roles:
      - name: admin
        rules:
          - resources: ["kafkas", "topics", "consumerGroups", "acls"]
            privileges: ["ALL"]
      - name: viewer
        rules:
          - resources: ["kafkas", "topics", "consumerGroups"]
            privileges: ["GET", "LIST"]
    subjects:
      - claim: "preferred_username"
        include: ["platformadmin", "maximilianopizarro"]
        roleNames: ["admin"]
      - claim: "preferred_username"
        include: ["user*"]
        roleNames: ["viewer"]
  kafkaClusters:
    - name: cdc-cluster
      namespace: kafka-cdc
      listener: plain
    - name: dev-cluster
      namespace: industrial-edge-tst-all
      listener: plain
    - name: factory-cluster
      namespace: industrial-edge-stormshift-messaging
      listener: plain
    - name: prod-cluster
      namespace: industrial-edge-data-lake
      listener: plain
  kafkaConnectClusters:
    - name: cdc-connect
      namespace: kafka-cdc
      url: http://cdc-connect-connect-api.kafka-cdc.svc:8083
      kafkaClusters:
        - kafka-cdc/cdc-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-console-connect-access
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkaconnects", "kafkaconnectors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-console-connect-access
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: kafka-console-console-serviceaccount
    namespace: kafka-cdc
roleRef:
  kind: Role
  name: kafka-console-connect-access
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
