apiVersion: v1
kind: ConfigMap
metadata:
  name: yolo-serving-script
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "4"
data:
  serve.py: |
    import os, io, json, logging
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from ultralytics import YOLO

    logging.basicConfig(level=logging.INFO, format="%(asctime)s [yolo-serve] %(message)s")
    log = logging.getLogger("yolo-serve")

    MODEL_PATH = os.environ.get("YOLO_MODEL_PATH", "/models/yolov8n.pt")
    PORT = int(os.environ.get("PORT", "8000"))

    log.info("Loading YOLO model from %s ...", MODEL_PATH)
    model = YOLO(MODEL_PATH)
    log.info("Model loaded: %s — %d classes", MODEL_PATH, len(model.names))

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self._json_response(200, {"status": "healthy", "model": MODEL_PATH, "classes": len(model.names)})
            elif self.path == "/v1/models":
                self._json_response(200, {"model": os.path.basename(MODEL_PATH), "classes": model.names})
            else:
                self._json_response(404, {"error": "not found"})

        def do_POST(self):
            if self.path != "/v1/predict":
                self._json_response(404, {"error": "not found"})
                return
            content_length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(content_length)
            content_type = self.headers.get("Content-Type", "")
            try:
                if "application/json" in content_type:
                    data = json.loads(body)
                    image_url = data.get("image_url", "")
                    conf = float(data.get("confidence", 0.5))
                    results = model.predict(source=image_url, conf=conf, verbose=False)
                elif "image/" in content_type or "multipart" in content_type or "octet-stream" in content_type:
                    conf = float(self.headers.get("X-Confidence", "0.5"))
                    results = model.predict(source=io.BytesIO(body), conf=conf, verbose=False)
                else:
                    self._json_response(400, {"error": "unsupported content type"})
                    return
                detections = []
                for r in results:
                    for box in r.boxes:
                        cls_id = int(box.cls[0])
                        detections.append({
                            "class_id": cls_id,
                            "class_name": model.names[cls_id],
                            "confidence": round(float(box.conf[0]), 4),
                            "bbox": {
                                "x1": round(float(box.xyxy[0][0]), 1),
                                "y1": round(float(box.xyxy[0][1]), 1),
                                "x2": round(float(box.xyxy[0][2]), 1),
                                "y2": round(float(box.xyxy[0][3]), 1),
                            }
                        })
                self._json_response(200, {
                    "model": os.path.basename(MODEL_PATH),
                    "detections": detections,
                    "count": len(detections)
                })
            except Exception as e:
                log.error("Inference error: %s", e)
                self._json_response(500, {"error": str(e)})

        def _json_response(self, code, obj):
            body = json.dumps(obj).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            log.info(fmt, *args)

    if __name__ == "__main__":
        log.info("YOLO serving on port %d", PORT)
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-ppe-serving
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app: yolo-ppe-serving
    app.kubernetes.io/part-of: neuroface-cv
    app.openshift.io/runtime: python
spec:
  replicas: {{ .Values.ppe.yolo.replicas }}
  selector:
    matchLabels:
      app: yolo-ppe-serving
  template:
    metadata:
      labels:
        app: yolo-ppe-serving
    spec:
      initContainers:
        - name: download-model
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sh", "-c"]
          args:
            - |
              MODEL_DIR=/models
              MODEL_FILE="$MODEL_DIR/{{ .Values.ppe.yolo.modelName }}.pt"
              if [ -f "$MODEL_FILE" ]; then
                echo "Model already downloaded"
                ls -lh "$MODEL_FILE"
                exit 0
              fi
              mkdir -p "$MODEL_DIR"
              echo "Downloading {{ .Values.ppe.yolo.modelName }} ..."
              curl -sL "{{ .Values.ppe.yolo.modelUrl }}" -o "$MODEL_FILE"
              ls -lh "$MODEL_FILE"
              echo "Download complete"
          volumeMounts:
            - name: model-store
              mountPath: /models
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: yolo
          image: {{ .Values.ppe.yolo.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet ultralytics &&
              pip install --quiet --force-reinstall --no-deps opencv-python-headless &&
              python /config/serve.py
          env:
            - name: YOLO_MODEL_PATH
              value: "/models/{{ .Values.ppe.yolo.modelName }}.pt"
            - name: PORT
              value: "{{ .Values.ppe.yolo.port }}"
          ports:
            - containerPort: {{ .Values.ppe.yolo.port }}
              protocol: TCP
              name: http
          volumeMounts:
            - name: model-store
              mountPath: /models
            - name: serving-script
              mountPath: /config
          resources:
            requests:
              cpu: {{ .Values.ppe.yolo.resources.requests.cpu }}
              memory: {{ .Values.ppe.yolo.resources.requests.memory }}
            limits:
              cpu: {{ .Values.ppe.yolo.resources.limits.cpu | quote }}
              memory: {{ .Values.ppe.yolo.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ppe.yolo.port }}
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ppe.yolo.port }}
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: model-store
          emptyDir: {}
        - name: serving-script
          configMap:
            name: yolo-serving-script
---
apiVersion: v1
kind: Service
metadata:
  name: yolo-ppe-serving
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app: yolo-ppe-serving
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ppe.yolo.port }}
      targetPort: {{ .Values.ppe.yolo.port }}
      protocol: TCP
      name: http
  selector:
    app: yolo-ppe-serving
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: yolo-ppe-serving
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app: yolo-ppe-serving
spec:
  to:
    kind: Service
    name: yolo-ppe-serving
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
