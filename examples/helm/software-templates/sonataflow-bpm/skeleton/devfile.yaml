schemaVersion: 2.2.2
metadata:
  name: ${{ values.name }}
  version: 1.0.0
  displayName: SonataFlow BPM Workflow
  description: Serverless workflow with SonataFlow visual editor
  language: yaml
  projectType: sonataflow
  tags:
    - SonataFlow
    - BPM
    - Workflow
    - Kogito
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "kie-group.swf-vscode-extension",
        "redhat.vscode-kaoto",
        "redhat.vscode-yaml",
        "redhat.vscode-xml",
        "redhat.java",
        "redhat.vscode-quarkus",
        "jbangdev.jbang-vscode",
        "redhat.vscode-openshift-connector",
        "Continue.continue"
      ]
    }
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      env:
        - name: DEFAULT_EXTENSIONS
          value: "/home/user/.vsix-cache/swf-editor.vsix;/home/user/.vsix-cache/kaoto.vsix"
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 1Gi
commands:
  - id: install-vsix-extensions
    exec:
      component: tools
      commandLine: |
        mkdir -p /home/user/.vsix-cache
        [ -f /home/user/.vsix-cache/swf-editor.vsix ] || \
          curl -sL "https://kie-group.gallerycdn.vsassets.io/extensions/kie-group/swf-vscode-extension/10.1.0/1752011077537/Microsoft.VisualStudio.Services.VSIXPackage" -o /home/user/.vsix-cache/swf-editor.vsix
        [ -f /home/user/.vsix-cache/kaoto.vsix ] || \
          curl -sL "https://redhat.gallerycdn.vsassets.io/extensions/redhat/vscode-kaoto/2.10.2/1775215869920/Microsoft.VisualStudio.Services.VSIXPackage" -o /home/user/.vsix-cache/kaoto.vsix
        which jbang >/dev/null 2>&1 || curl -Ls https://sh.jbang.dev | bash -s - app setup
  - id: setup-continue
    exec:
      component: tools
      commandLine: |
        mkdir -p /home/user/.continue
        cp /projects/${{ values.name }}/continue-config.json /home/user/.continue/config.json
        if [ -n "$CONTINUE_API_KEY" ]; then
          sed -i "s|CONTINUE_API_KEY_PLACEHOLDER|$CONTINUE_API_KEY|g" /home/user/.continue/config.json
        fi
        if [ -n "$CONTINUE_API_BASE" ]; then
          sed -i "s|https://litellm-prod.apps.maas.redhatworkshops.io/v1|$CONTINUE_API_BASE|g" /home/user/.continue/config.json
        fi
        if [ -n "$CONTINUE_MODEL" ]; then
          sed -i "s|deepseek-r1-distill-qwen-14b|$CONTINUE_MODEL|g" /home/user/.continue/config.json
        fi
  - id: build
    exec:
      component: tools
      commandLine: "mvn package -DskipTests"
      workingDir: ${PROJECT_SOURCE}
  - id: run
    exec:
      component: tools
      commandLine: "mvn quarkus:dev"
      workingDir: ${PROJECT_SOURCE}
events:
  postStart:
    - install-vsix-extensions
    - setup-continue
