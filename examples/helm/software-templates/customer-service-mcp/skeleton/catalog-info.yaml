apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}
  description: ${{values.description}}
  annotations:
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    janus-idp.io/tekton: ${{values.uniqueName}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
    che.eclipse.org/che-server: https://devspaces.${{values.clusterDomain}}
    devspaces.io/factory: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
  links:
    - url: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
      title: Open in DevSpaces
      icon: catalog
      type: ide
  tags:
    - java
    - quarkus
    - mcp
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  providesApis:
    - ${{values.uniqueName}}-api
  dependsOn:
    - component:default/${{values.owner}}-neuralbank-backend
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-api
  description: "MCP Server API for customer service AI agent"
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  definition: |
    openapi: 3.0.0
    info:
      title: Customer Service MCP API
      version: 1.0.0
      description: >
        Model Context Protocol server for AI-powered customer service.
        Protected by Kuadrant OIDCPolicy (Keycloak OIDC) and
        RateLimitPolicy (60 req/min per user).
    paths:
      /mcp:
        post:
          summary: MCP protocol endpoint
