apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{values.uniqueName}}
  description: "${{values.description}}"
spec:
  owner: user:${{values.owner}}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-sensors
  description: "Machine Sensors — ${{values.sensorCount}} IoT simulators sending vibration/temperature via MQTT"
  annotations:
    backstage.io/kubernetes-id: ${{values.uniqueName}}-sensor-1
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
  tags:
    - iot
    - sensor
    - mqtt
    - industrial-edge
  links:
    - url: "https://console-openshift-console.${{values.clusterDomain}}/k8s/ns/${{values.namespace}}/deployments"
      title: Sensor Deployments
      icon: web
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  providesApis:
    - ${{values.uniqueName}}-mqtt-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-kafka
  description: "Kafka Cluster — ${{values.kafkaReplicas}}-node KRaft cluster for IoT event streaming"
  annotations:
    backstage.io/kubernetes-id: ${{values.uniqueName}}-cluster
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
  tags:
    - kafka
    - amq-streams
    - event-streaming
    - industrial-edge
  links:
    - url: "https://console-openshift-console.${{values.clusterDomain}}/k8s/ns/${{values.namespace}}/kafka.strimzi.io~v1beta2~Kafka/${{values.uniqueName}}-cluster"
      title: Kafka Cluster
      icon: web
    - url: "https://kafka-console-kafka-cdc.${{values.clusterDomain}}"
      title: Kafka Streams Console
      icon: dashboard
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  dependsOn:
    - component:default/${{values.uniqueName}}-sensors
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-camel-k
  description: "Camel K — MQTT→Kafka integration with Kaoto visual designer"
  annotations:
    backstage.io/kubernetes-id: mqtt2kafka-integration
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    kafka.apache.org/consumer-groups: ${{values.uniqueName}}-cluster/mqtt2kafka-integration
    che.eclipse.org/che-server: https://devspaces.${{values.clusterDomain}}
    devspaces.io/factory: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
  tags:
    - camel-k
    - kaoto
    - integration
    - industrial-edge
  links:
    - url: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
      title: Open in DevSpaces (Kaoto)
      icon: catalog
      type: ide
    - url: "https://console-openshift-console.${{values.clusterDomain}}/k8s/ns/${{values.namespace}}/camel.apache.org~v1~Integration"
      title: Camel Integrations (Console)
      icon: web
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  consumesApis:
    - ${{values.uniqueName}}-mqtt-api
  providesApis:
    - ${{values.uniqueName}}-kafka-api
  dependsOn:
    - component:default/${{values.uniqueName}}-kafka
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-dashboard
  description: "Line Dashboard — Real-time visualization of sensor data and anomaly alerts"
  annotations:
    backstage.io/kubernetes-id: ${{values.uniqueName}}-dashboard
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
  tags:
    - dashboard
    - frontend
    - websocket
    - industrial-edge
  links:
    - url: "https://line-dashboard-${{values.namespace}}.${{values.clusterDomain}}"
      title: Line Dashboard
      icon: dashboard
spec:
  type: website
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  dependsOn:
    - component:default/${{values.uniqueName}}-kafka
{%- if values.anomalyDetection %}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-kafka-to-s3
  description: "Kafka→S3 — Streams sensor data from Kafka topics to MinIO for ML training"
  annotations:
    backstage.io/kubernetes-id: kafka-to-s3-integration
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    kafka.apache.org/consumer-groups: ${{values.uniqueName}}-cluster/kafka-to-s3-integration
  tags:
    - camel-k
    - s3
    - data-lake
    - industrial-edge
  links:
    - url: "https://console-openshift-console.${{values.clusterDomain}}/k8s/ns/${{values.namespace}}/camel.apache.org~v1~Integration/kafka-to-s3-integration"
      title: Kafka→S3 Integration (Console)
      icon: web
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  dependsOn:
    - component:default/${{values.uniqueName}}-kafka
{%- endif %}
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-mqtt-api
  description: "MQTT IoT sensor events — vibration and temperature"
  tags:
    - mqtt
    - iot
    - events
spec:
  type: asyncapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  definition: |
    asyncapi: 2.6.0
    info:
      title: "${{values.uniqueName}} IoT Sensor Events"
      version: 1.0.0
    channels:
      iot-sensor/sw/vibration:
        publish:
          summary: Vibration sensor readings
          message:
            payload:
              type: string
              description: "CSV: line,pump,value,timestamp"
      iot-sensor/sw/temperature:
        publish:
          summary: Temperature sensor readings
          message:
            payload:
              type: string
              description: "CSV: line,sensor,value,timestamp"
    servers:
      broker:
        url: "broker-amq-mqtt-all-0-svc.${{values.namespace}}.svc:61616"
        protocol: mqtt
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-kafka-api
  description: "Kafka IoT sensor topics — vibration and temperature streams"
  tags:
    - kafka
    - iot
    - streaming
spec:
  type: asyncapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.uniqueName}}
  definition: |
    asyncapi: 2.6.0
    info:
      title: "${{values.uniqueName}} Kafka Streams"
      version: 1.0.0
    channels:
      iot-sensor-sw-vibration:
        subscribe:
          summary: Vibration sensor readings bridged from MQTT
          message:
            payload:
              type: string
              description: "CSV: line,pump,value,timestamp"
      iot-sensor-sw-temperature:
        subscribe:
          summary: Temperature sensor readings bridged from MQTT
          message:
            payload:
              type: string
              description: "CSV: line,sensor,value,timestamp"
    servers:
      kafka:
        url: "${{values.uniqueName}}-cluster-kafka-bootstrap.${{values.namespace}}.svc:9092"
        protocol: kafka
