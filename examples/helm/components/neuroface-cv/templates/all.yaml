apiVersion: v1
kind: ConfigMap
metadata:
  name: cv-processor-script
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  cv-processor.py: |
    import os, json, time, threading, logging, ssl
    from datetime import datetime, timezone
    import requests
    from confluent_kafka import Producer, Consumer, KafkaError

    logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(name)s] %(message)s")
    log = logging.getLogger("cv-processor")

    BOOTSTRAP = os.environ["KAFKA_BOOTSTRAP"]
    USER      = os.environ["KAFKA_USER"]
    PASSWORD  = os.environ["KAFKA_PASSWORD"]
    CA_CERT   = os.environ["KAFKA_CA_CERT"]
    OVMS      = os.environ["OVMS_URL"]
    NEUROFACE = os.environ["NEUROFACE_URL"]
    MAILPIT   = os.environ["MAILPIT_URL"]
    TOPIC     = "cv.face.detections"
    DLQ       = "dlq.cv-errors"

    def kafka_conf(extra=None):
        cfg = {
            "bootstrap.servers": BOOTSTRAP,
            "security.protocol": "SASL_SSL",
            "sasl.mechanism":    "SCRAM-SHA-512",
            "sasl.username":     USER,
            "sasl.password":     PASSWORD,
            "ssl.ca.location":   CA_CERT,
        }
        if extra:
            cfg.update(extra)
        return cfg

    producer = Producer(kafka_conf())

    def publish(event):
        payload = json.dumps(event)
        producer.produce(TOPIC, value=payload.encode())
        producer.flush(timeout=5)
        log.info("Published %s event for %s", event.get("event_type"), event.get("person_name", "system"))

    def poll_ovms():
        while True:
            try:
                r = requests.get(f"{OVMS}/v1/config", timeout=10)
                r.raise_for_status()
                publish({
                    "event_type":    "ovms_model_status",
                    "source":        "openvino-model-server",
                    "model_name":    "face-detection-retail-0005",
                    "model_server":  "ovms",
                    "ovms_response": r.json(),
                    "camera_id":     "ovms-monitor",
                    "timestamp":     datetime.now(timezone.utc).isoformat(),
                    "person_name":   "system",
                    "confidence":    1.0,
                })
            except Exception as e:
                log.warning("OVMS not reachable: %s", e)
            time.sleep(30)

    def poll_labels():
        seen = set()
        while True:
            try:
                r = requests.get(f"{NEUROFACE}/api/labels", timeout=10)
                r.raise_for_status()
                data = r.json()
                labels = data if isinstance(data, list) else data.get("labels", [])
                for label in labels:
                    name = label if isinstance(label, str) else label.get("name", str(label))
                    face_count = label.get("face_count", 1) if isinstance(label, dict) else 1
                    if name not in seen:
                        seen.add(name)
                        publish({
                            "event_type":       "person_registered",
                            "source":           "neuroface-lbph",
                            "person_name":      name,
                            "face_count":       face_count,
                            "confidence":       1.0,
                            "camera_id":        "label-registry",
                            "timestamp":        datetime.now(timezone.utc).isoformat(),
                            "detection_method": "lbph",
                        })
            except Exception as e:
                log.warning("NeuroFace backend not ready: %s", e)
            time.sleep(30)

    def send_mail(event):
        etype = event.get("event_type")
        if etype == "person_registered":
            mail = {
                "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                "to":   [{"name": "Security Admin", "email": "admin@neuralbank.io"}],
                "subject": f"Person Registered: {event['person_name']}",
                "html": f"<h2>New Person Registered</h2><p><b>Name:</b> {event['person_name']}</p>"
                         f"<p><b>Face samples:</b> {event.get('face_count',1)}</p>"
                         f"<p><b>Model:</b> {event.get('detection_method','lbph')}</p>"
                         f"<p><b>Timestamp:</b> {event['timestamp']}</p>"
                         f"<hr><p style='color:#666;font-size:12px'>NeuroFace LBPH — Event-Driven Architecture</p>",
            }
        elif etype == "ovms_model_status":
            mail = {
                "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                "to":   [{"name": "ML Ops", "email": "mlops@neuralbank.io"}],
                "subject": f"OVMS Model Status: {event.get('model_name','')}",
                "html": f"<h2>OpenVINO Model Server Status</h2>"
                         f"<p><b>Model:</b> {event.get('model_name','')}</p>"
                         f"<p><b>Server:</b> {event.get('model_server','')}</p>"
                         f"<p><b>Timestamp:</b> {event['timestamp']}</p>"
                         f"<hr><p style='color:#666;font-size:12px'>OVMS Monitor — Event-Driven Architecture</p>",
            }
        else:
            return
        try:
            requests.post(f"{MAILPIT}/api/v1/send", json=mail, timeout=10)
            log.info("Email sent: %s", mail["subject"])
        except Exception as e:
            log.warning("Mailpit error: %s", e)

    def consume_and_notify():
        c = Consumer(kafka_conf({"group.id": "cv-python-consumer", "auto.offset.reset": "latest"}))
        c.subscribe([TOPIC])
        log.info("Kafka consumer started on %s", TOPIC)
        while True:
            msg = c.poll(timeout=5.0)
            if msg is None:
                continue
            if msg.error():
                if msg.error().code() != KafkaError._PARTITION_EOF:
                    log.error("Kafka error: %s", msg.error())
                continue
            try:
                event = json.loads(msg.value().decode())
                log.info("CV event received: %s / %s", event.get("event_type"), event.get("person_name",""))
                send_mail(event)
            except Exception as e:
                log.error("Processing error: %s", e)

    if __name__ == "__main__":
        log.info("Starting CV Processor — OVMS poller, Labels poller, Kafka consumer")
        threading.Thread(target=poll_ovms, daemon=True, name="ovms-poller").start()
        threading.Thread(target=poll_labels, daemon=True, name="labels-poller").start()
        consume_and_notify()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-cv-processor
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: camel-cv-processor
    app.kubernetes.io/part-of: neuroface-cv
    app.openshift.io/runtime: camel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camel-cv-processor
  template:
    metadata:
      labels:
        app: camel-cv-processor
    spec:
      containers:
        - name: camel
          image: registry.access.redhat.com/ubi9/python-312:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet requests confluent-kafka &&
              python /config/cv-processor.py
          env:
            - name: KAFKA_BOOTSTRAP
              value: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9093
            - name: KAFKA_USER
              value: cdc-user
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cdc-user
                  key: password
            - name: KAFKA_CA_CERT
              value: /etc/kafka-certs/ca.crt
            - name: OVMS_URL
              value: http://neuroface-ovms.neuroface.svc:8000
            - name: NEUROFACE_URL
              value: http://neuroface-backend.neuroface.svc:8080
            - name: MAILPIT_URL
              value: http://n8n-mailpit.openshift-lightspeed.svc:8025
          volumeMounts:
            - name: processor-script
              mountPath: /config
            - name: kafka-ca-cert
              mountPath: /etc/kafka-certs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: processor-script
          configMap:
            name: cv-processor-script
        - name: kafka-ca-cert
          secret:
            secretName: cdc-cluster-cluster-ca-cert
---
