apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: sonataflow-bpm-workflow
  title: "SonataFlow BPM Workflow"
  description: "Create a SonataFlow serverless workflow with visual editor in DevSpaces"
  tags:
    - sonataflow
    - bpm
    - workflow
    - kogito
    - recommended
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Project Configuration
      required:
        - name
        - owner
        - clusterDomain
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the workflow project
          ui:autofocus: true
          default: "my-sonataflow-workflow"
          pattern: "^[a-z0-9-]+$"
        owner:
          title: User (OpenShift username)
          type: string
          description: "Your OpenShift username. Defines the deploy namespace: <username>-apps"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
          ui:help: "E.g.: user1 → namespace user1-apps"
        description:
          title: Description
          type: string
          description: Description of the workflow
          default: "Serverless workflow for business process automation with SonataFlow"
        clusterDomain:
          title: Cluster Domain
          type: string
          description: "OpenShift apps domain"
          ui:help: "Run: oc get ingresses.config cluster -o jsonpath='{.spec.domain}'"
  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}"
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-apps"
          clusterDomain: ${{ parameters.clusterDomain }}

    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /main/catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in DevSpaces
        icon: chat
        url: "https://devspaces.${{ parameters.clusterDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}"
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
