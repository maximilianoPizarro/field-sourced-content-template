      version: opset13
    - name: onnx
      version: "1"
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: face-detection-retail-0005
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    serving.kserve.io/deploymentMode: RawDeployment
    openshift.io/display-name: "Face Detection Retail 0005"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    model:
      modelFormat:
        name: openvino_ir
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 4Gi
      runtime: ovms-face-detection
      storageUri: "pvc://face-detection-model-pvc/"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cv.face.detections
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: dlq.cv-errors
  namespace: kafka-cdc
  labels:
    strimzi.io/cluster: cdc-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cv-processor-script
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  cv-processor.py: |
    import os, json, time, threading, logging, ssl, locale
    from datetime import datetime, timezone
    import requests
    from requests.adapters import HTTPAdapter
    from urllib3.util.retry import Retry
    from confluent_kafka import Producer, Consumer, KafkaError

    logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(name)s] %(message)s")
    log = logging.getLogger("cv-processor")

    BOOTSTRAP = os.environ["KAFKA_BOOTSTRAP"]
    USER      = os.environ["KAFKA_USER"]
    PASSWORD  = os.environ["KAFKA_PASSWORD"]
    CA_CERT   = os.environ["KAFKA_CA_CERT"]
    OVMS      = os.environ["OVMS_URL"]
    NEUROFACE = os.environ["NEUROFACE_URL"]
    MAILPIT   = os.environ["MAILPIT_URL"]
    TOPIC     = "cv.face.detections"
    DLQ       = "dlq.cv-errors"

    def kafka_conf(extra=None):
        cfg = {
            "bootstrap.servers": BOOTSTRAP,
            "security.protocol": "SASL_SSL",
            "sasl.mechanism":    "SCRAM-SHA-512",
            "sasl.username":     USER,
            "sasl.password":     PASSWORD,
            "ssl.ca.location":   CA_CERT,
        }
        if extra:
            cfg.update(extra)
        return cfg

    producer = Producer(kafka_conf())

    _mail_session = requests.Session()
    _retry = Retry(total=3, backoff_factor=1, status_forcelist=[502, 503, 504])
    _mail_session.mount("http://", HTTPAdapter(max_retries=_retry))
    _mail_session.mount("https://", HTTPAdapter(max_retries=_retry))

    def human_ts():
        now = datetime.now(timezone.utc)
        return now.strftime("%d %b %Y — %H:%M:%S UTC")

    def publish(event):
        payload = json.dumps(event)
        producer.produce(TOPIC, value=payload.encode())
        producer.flush(timeout=5)
        log.info("Published %s event for %s", event.get("event_type"), event.get("person_name", "system"))

    def poll_ovms():
        while True:
            try:
                r = requests.get(f"{OVMS}/v1/config", timeout=10)
                r.raise_for_status()
                publish({
                    "event_type":    "ovms_model_status",
                    "source":        "openvino-model-server",
                    "model_name":    "face-detection-retail-0005",
                    "model_server":  "ovms",
                    "ovms_response": r.json(),
                    "camera_id":     "ovms-monitor",
                    "timestamp":     human_ts(),
                    "person_name":   "system",
                    "confidence":    1.0,
                })
            except Exception as e:
                log.warning("OVMS not reachable: %s", e)
            time.sleep(60)

    def poll_labels():
        seen = set()
        while True:
            try:
                r = requests.get(f"{NEUROFACE}/api/labels", timeout=10)
                r.raise_for_status()
                data = r.json()
                labels = data if isinstance(data, list) else data.get("labels", [])
                for label in labels:
                    name = label if isinstance(label, str) else label.get("name", str(label))
                    face_count = label.get("face_count", 1) if isinstance(label, dict) else 1
                    if name not in seen:
                        seen.add(name)
                        publish({
                            "event_type":       "person_registered",
                            "source":           "neuroface-lbph",
                            "person_name":      name,
                            "face_count":       face_count,
                            "confidence":       1.0,
                            "camera_id":        "label-registry",
                            "timestamp":        human_ts(),
                            "detection_method": "lbph",
                        })
                    publish({
                        "event_type":       "person_detected",
                        "source":           "neuroface-lbph",
                        "person_name":      name,
                        "face_count":       face_count,
                        "confidence":       1.0,
                        "camera_id":        "label-registry",
                        "timestamp":        human_ts(),
                        "detection_method": "lbph",
                        "total_labels":     len(labels),
                    })
            except Exception as e:
                log.warning("NeuroFace backend not ready: %s", e)
            time.sleep(30)

    def _corporate_template(title, icon, accent, rows, footer_note):
        row_html = ""
        for label, value in rows:
            row_html += (
                f'<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;color:#666;'
                f'font-size:13px;width:160px;font-weight:600">{label}</td>'
                f'<td style="padding:8px 12px;border-bottom:1px solid #eee;color:#1a1a1a;'
                f'font-size:13px">{value}</td></tr>'
            )
        return (
            '<!DOCTYPE html><html><head><meta charset="utf-8"></head>'
            '<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif">'
            '<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:24px 0">'
            '<tr><td align="center"><table width="600" cellpadding="0" cellspacing="0" '
            'style="background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)">'
            f'<tr><td style="background:{accent};padding:24px 32px">'
            '<table width="100%"><tr>'
            '<td style="color:#fff;font-size:20px;font-weight:700;letter-spacing:-0.5px">'
            f'{icon} {title}</td>'
            '<td align="right" style="color:rgba(255,255,255,0.8);font-size:11px">'
            'NeuralBank Security</td></tr></table></td></tr>'
            '<tr><td style="padding:28px 32px 12px">'
            '<table width="100%" cellpadding="0" cellspacing="0" '
            'style="border:1px solid #e8e8e8;border-radius:6px;overflow:hidden">'
            '<tr><td style="background:#fafafa;padding:10px 12px;font-size:11px;color:#999;'
            'text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:2px solid '
            f'{accent}">Event Details</td><td style="background:#fafafa;border-bottom:2px solid '
            f'{accent}"></td></tr>{row_html}</table></td></tr>'
            '<tr><td style="padding:0 32px 24px"><table width="100%" style="margin-top:16px;'
            f'background:#f8f9fa;border-radius:6px;border-left:4px solid {accent}">'
            f'<tr><td style="padding:12px 16px;font-size:12px;color:#555">{footer_note}</td>'
            '</tr></table></td></tr>'
            '<tr><td style="background:#151515;padding:16px 32px">'
            '<table width="100%"><tr>'
            '<td style="color:#999;font-size:11px">NeuroFace CV Pipeline &middot; '
            'Event-Driven Architecture</td>'
            '<td align="right" style="color:#666;font-size:11px">'
            '<span style="color:#c00">&bull;</span> Red Hat OpenShift</td>'
            '</tr></table></td></tr>'
            '</table></td></tr></table></body></html>'
        )

    def send_mail(event):
        etype = event.get("event_type")
        if etype == "person_registered":
            name = event.get("person_name", "Unknown")
            rows = [
                ("Person Name", f'<span style="font-size:15px;font-weight:700;color:#c00">{name}</span>'),
                ("Face Samples", str(event.get("face_count", 1))),
                ("Detection Method", event.get("detection_method", "lbph").upper()),
                ("Source", event.get("source", "neuroface-lbph")),
                ("Camera / Registry", event.get("camera_id", "label-registry")),
                ("Timestamp", event.get("timestamp", "")),
                ("Kafka Topic", "cv.face.detections"),
            ]
            html = _corporate_template(
                title="Person Registered",
                icon="&#128100;",
                accent="#c00",
                rows=rows,
                footer_note=(
                    f'<strong>Action Required:</strong> A new identity "<strong>{name}</strong>" '
                    'has been registered in the facial recognition system. Verify that this '
                    'registration was authorized and review access logs in the Kafka Console.'
                ),
            )
            mail = {
                "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                "to":   [{"name": "Security Admin", "email": "admin@neuralbank.io"}],
                "subject": f"\U0001f6a8 Person Registered: {name}",
                "html": html,
            }
        elif etype == "person_detected":
            name = event.get("person_name", "Unknown")
            rows = [
                ("Person Detected", f'<span style="font-size:15px;font-weight:700;color:#0a6640">{name}</span>'),
                ("Detection Method", event.get("detection_method", "lbph").upper()),
                ("Confidence", f'{event.get("confidence", 0):.0%}'),
                ("Total Identities", str(event.get("total_labels", "N/A"))),
                ("Source", event.get("source", "neuroface-lbph")),
                ("Camera / Registry", event.get("camera_id", "label-registry")),
                ("Timestamp", event.get("timestamp", "")),
                ("Kafka Topic", "cv.face.detections"),
            ]
            html = _corporate_template(
                title=f"Face Detected: {name}",
                icon="&#128247;",
                accent="#0a6640",
                rows=rows,
                footer_note=(
                    f'<strong>Detection Alert:</strong> The identity "<strong>{name}</strong>" '
                    'is currently registered in the LBPH facial recognition model. '
                    'This event is published every 30s while the label is active in the system.'
                ),
            )
            mail = {
                "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                "to":   [{"name": "Security Operations", "email": "security@neuralbank.io"}],
                "subject": f"\U0001f4f7 Face Detected: {name}",
                "html": html,
            }
        elif etype == "ovms_model_status":
            model = event.get("model_name", "face-detection-retail-0005")
            server = event.get("model_server", "ovms")
            resp = event.get("ovms_response", {})
            status_str = "Available"
            if isinstance(resp, dict):
                for v in resp.values():
                    if isinstance(v, dict):
                        statuses = v.get("model_version_status", [])
                        if statuses:
                            status_str = statuses[0].get("state", "Available")
            rows = [
                ("Model Name", f'<strong>{model}</strong>'),
                ("Server Type", server.upper()),
                ("Status", f'<span style="color:#0a0;font-weight:700">\u2713 {status_str}</span>'),
                ("Source", event.get("source", "openvino-model-server")),
                ("Monitor ID", event.get("camera_id", "ovms-monitor")),
                ("Timestamp", event.get("timestamp", "")),
                ("Kafka Topic", "cv.face.detections"),
            ]
            html = _corporate_template(
                title="Model Server Health",
                icon="&#9881;",
                accent="#0066cc",
                rows=rows,
                footer_note=(
                    f'<strong>Informational:</strong> The inference model "<strong>{model}</strong>" '
                    f'is reporting status <strong>{status_str}</strong>. '
                    'This is a periodic health check from the CV Processor polling loop (every 30s).'
                ),
            )
            mail = {
                "from": {"name": "NeuroFace CV Pipeline", "email": "neuroface@neuralbank.io"},
                "to":   [{"name": "ML Ops", "email": "mlops@neuralbank.io"}],
                "subject": f"\u2699\ufe0f OVMS Health: {model} [{status_str}]",
                "html": html,
            }
        else:
            return
        for attempt in range(3):
            try:
                _mail_session.post(f"{MAILPIT}/api/v1/send", json=mail, timeout=15)
                log.info("Email sent: %s", mail["subject"])
                break
            except Exception as e:
                log.warning("Mailpit attempt %d/3 failed: %s", attempt + 1, e)
                if attempt < 2:
                    time.sleep(2 ** attempt)

    def consume_and_notify():
        c = Consumer(kafka_conf({"group.id": "cv-python-consumer", "auto.offset.reset": "latest"}))
        c.subscribe([TOPIC])
        log.info("Kafka consumer started on %s", TOPIC)
        while True:
            msg = c.poll(timeout=5.0)
            if msg is None:
                continue
            if msg.error():
                if msg.error().code() != KafkaError._PARTITION_EOF:
                    log.error("Kafka error: %s", msg.error())
                continue
            try:
                event = json.loads(msg.value().decode())
                log.info("CV event received: %s / %s", event.get("event_type"), event.get("person_name",""))
                send_mail(event)
            except Exception as e:
                log.error("Processing error: %s", e)

    if __name__ == "__main__":
        log.info("Starting CV Processor — OVMS poller, Labels poller, Kafka consumer")
        threading.Thread(target=poll_ovms, daemon=True, name="ovms-poller").start()
        threading.Thread(target=poll_labels, daemon=True, name="labels-poller").start()
        consume_and_notify()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-cv-processor
  namespace: kafka-cdc
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: camel-cv-processor
    app.kubernetes.io/part-of: neuroface-cv
    app.openshift.io/runtime: camel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camel-cv-processor
  template:
    metadata:
      labels:
        app: camel-cv-processor
    spec:
      containers:
        - name: camel
          image: registry.access.redhat.com/ubi9/python-312:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet requests confluent-kafka &&
              python /config/cv-processor.py
          env:
            - name: KAFKA_BOOTSTRAP
              value: cdc-cluster-kafka-bootstrap.kafka-cdc.svc:9093
            - name: KAFKA_USER
              value: cdc-user
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cdc-user
                  key: password
            - name: KAFKA_CA_CERT
              value: /etc/kafka-certs/ca.crt
            - name: OVMS_URL
              value: http://neuroface-ovms.neuroface.svc:8000
            - name: NEUROFACE_URL
              value: http://neuroface-backend.neuroface.svc:8080
            - name: MAILPIT_URL
              value: http://n8n-mailpit.openshift-lightspeed.svc:8025
          volumeMounts:
            - name: processor-script
              mountPath: /config
            - name: kafka-ca-cert
              mountPath: /etc/kafka-certs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: processor-script
          configMap:
            name: cv-processor-script
        - name: kafka-ca-cert
          secret:
            secretName: cdc-cluster-cluster-ca-cert
