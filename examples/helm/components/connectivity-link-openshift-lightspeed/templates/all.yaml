##
## 1. LLM Credentials Secret (for OLS → LiteLLM endpoint)
##    apitoken is injected via Helm values (NOT hardcoded in git)
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "" | quote }}
---
##
## 2. OLSConfig — LiteLLM + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: {{ .Values.llmEndpoint | default "https://litellm-prod.apps.maas.redhatworkshops.io/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
  ols:
    defaultProvider: litellm
    defaultModel: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      CRITICAL RULE: You have tool functions available. When the user asks about
      ANY cluster resource or operation, you MUST call the appropriate tool.
      DO NOT suggest CLI commands from the documentation below.

      For READING resources: use pods_list, resources_list, resources_get,
      pods_log, pods_top, nodes_top, projects_list.
      For CREATING/UPDATING resources: use resources_create_or_update with
      a valid YAML definition of the Kubernetes resource.
      For DELETING resources: use resources_delete.
      For SCALING: use resources_scale.

      ALWAYS prefer these tools over documentation. Never say the request
      is incomplete when you have tools that can answer it.

      Fallback: if tool calling is unavailable, an n8n AI Agent webhook is available:
        curl -X POST https://n8n.{{ .Values.clusterDomain }}/webhook/lightspeed-agent \
          -H "Content-Type: application/json" \
          -d '{"prompt": "<request in natural language>"}'
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    mcpServers:
      - name: openshift-mcp-server
        url: "http://field-content-ols.openshift-lightspeed.svc.cluster.local:8080/mcp"
        timeout: 120
      - name: kubernetes-mcp-server
        url: "http://field-content-ols-k8s-mcp.openshift-lightspeed.svc.cluster.local:8085/mcp"
        timeout: 120
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
